<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap">
<title>TTS Player</title>
<style>
:root {
  --bg: #F5F0E8;
  --bg-elevated: #FFFDF8;
  --bg-sunken: #EDE8DE;
  --text: #2C2C2C;
  --text-secondary: #6B6560;
  --text-muted: #A09890;
  --border: #DDD6CB;
  --accent: #3D5A80;
  --accent-hover: #2C4A6E;
  --accent-light: #E8EEF4;
  --vermillion: #C1440E;
  --ink: #2C2C2C;
  --paper: #F5F0E8;
  --shadow-sm: 0 1px 2px rgba(44,44,44,0.06);
  --shadow: 0 2px 8px rgba(44,44,44,0.08), 0 1px 2px rgba(44,44,44,0.04);
  --shadow-lg: 0 8px 24px rgba(44,44,44,0.1), 0 2px 8px rgba(44,44,44,0.06);
  --radius: 12px;
  --radius-sm: 8px;
  --font-display: 'Shippori Mincho', serif;
  --font-body: 'Noto Sans JP', sans-serif;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1A1A24;
    --bg-elevated: #24243A;
    --bg-sunken: #14141E;
    --text: #E8E4DC;
    --text-secondary: #A09890;
    --text-muted: #6B6560;
    --border: #33334A;
    --accent: #7BA3CC;
    --accent-hover: #90B8E0;
    --accent-light: #252540;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow: 0 2px 8px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  background-image: var(--grain);
  color: var(--text);
  line-height: 1.6;
  padding: 20px 16px;
  min-height: 100vh;
}

.container { max-width: 480px; margin: 0 auto; }

/* — Now Playing Card — */
.now-playing {
  background: var(--bg-elevated);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 36px 28px 28px;
  text-align: center;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.now-playing::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--vermillion));
  opacity: 0;
  transition: opacity 0.4s ease;
}

.now-playing.active::before { opacity: 1; }

/* Decorative corner marks — like a stamp registration mark */
.now-playing::after {
  content: '◆';
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 0.6rem;
  color: var(--vermillion);
  opacity: 0.4;
}

.np-label {
  font-family: var(--font-body);
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.np-japanese {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 6px;
  transition: color 0.3s ease;
}

.now-playing.active .np-japanese { color: var(--accent); }

.np-reading {
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 300;
  color: var(--text-secondary);
  margin-bottom: 2px;
  letter-spacing: 0.5px;
}

.np-meaning {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 28px;
  font-weight: 300;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

.btn-ctrl {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text);
  font-size: 0.95rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
}

.btn-ctrl:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: scale(1.05);
}

.btn-play {
  width: 56px;
  height: 56px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 1.2rem;
  box-shadow: 0 4px 12px rgba(61,90,128,0.3);
}

.btn-play:hover {
  background: var(--accent-hover);
  transform: scale(1.08);
  box-shadow: 0 6px 16px rgba(61,90,128,0.35);
}

.np-counter {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 8px;
  letter-spacing: 1px;
}

/* — Settings Panel — */
.settings {
  background: var(--bg-elevated);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.setting-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.setting-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  min-width: 40px;
  letter-spacing: 0.5px;
}

.voice-select {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-size: 0.8rem;
  font-family: var(--font-body);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}

.voice-select:focus { border-color: var(--accent); }

.speed-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

.speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(61,90,128,0.25);
  transition: transform 0.15s;
}

.speed-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

.speed-val {
  font-size: 0.8rem;
  font-weight: 600;
  min-width: 34px;
  text-align: right;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.toggle-row {
  display: flex;
  gap: 8px;
}

.btn-toggle {
  flex: 1;
  padding: 9px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text-secondary);
  font-size: 0.78rem;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 0.3px;
}

.btn-toggle:hover { border-color: var(--accent); color: var(--accent); }
.btn-toggle.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(61,90,128,0.2);
}

/* — Playlist — */
.playlist-header {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 10px;
  padding-left: 2px;
}

.playlist {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.pl-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
}

.pl-item:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}

.pl-item.active {
  border-color: var(--accent);
  background: var(--accent-light);
  box-shadow: var(--shadow-sm);
}

.pl-num {
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  min-width: 20px;
  text-align: center;
}

.pl-item.active .pl-num { color: var(--accent); }

.pl-text { flex: 1; min-width: 0; }

.pl-jp {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
}

.pl-sub {
  font-size: 0.72rem;
  color: var(--text-secondary);
  font-weight: 300;
  margin-top: 1px;
}

.pl-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--bg-sunken);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: all 0.25s ease;
}

.pl-item.active .pl-icon {
  background: var(--accent);
  color: #fff;
}

/* Animations */
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.now-playing.active .btn-play {
  animation: pulse 2s ease-in-out infinite;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.container > * {
  animation: slideUp 0.4s ease-out both;
}
.container > *:nth-child(2) { animation-delay: 0.06s; }
.container > *:nth-child(3) { animation-delay: 0.12s; }
.container > *:nth-child(4) { animation-delay: 0.18s; }

.empty-state {
  text-align: center;
  padding: 56px 20px;
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-size: 1rem;
}

.voice-info {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-style: italic;
}

@media (max-width: 480px) {
  .np-japanese { font-size: 2.4rem; }
  .now-playing { padding: 28px 20px 22px; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const DATA = null;

;(function() {
  var app = document.getElementById('app');

  if (!DATA || !DATA.words || DATA.words.length === 0) {
    app.innerHTML = '<div class="empty-state">No data.</div>';
    return;
  }

  if (!('speechSynthesis' in window)) {
    app.innerHTML = '<div class="empty-state">Web Speech API not supported.<br>Please use Chrome, Safari, or Edge.</div>';
    return;
  }

  var jaVoices = [];
  var selectedVoiceIdx = 0;
  var rate = DATA.rate || 0.8;
  var currentIdx = 0;
  var isPlaying = false;
  var isAutoPlaying = false;
  var isLooping = false;

  function loadVoices() {
    var all = speechSynthesis.getVoices();
    jaVoices = all.filter(function(v) { return v.lang && v.lang.startsWith('ja'); });
    if (jaVoices.length === 0) {
      jaVoices = all.filter(function(v) { return v.lang && v.lang.indexOf('ja') !== -1; });
    }
    var sel = document.getElementById('voice-sel');
    if (sel && jaVoices.length > 0) {
      sel.innerHTML = '';
      jaVoices.forEach(function(v, i) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = v.name.replace('Google ', '').replace('Microsoft ', 'MS ') + (v.localService ? ' (local)' : '');
        if (i === selectedVoiceIdx) opt.selected = true;
        sel.appendChild(opt);
      });
    }
    var info = document.getElementById('voice-info');
    if (info && jaVoices.length === 1) {
      info.textContent = jaVoices[0].name;
    }
  }

  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function getVoice() {
    return jaVoices.length > 0 ? jaVoices[selectedVoiceIdx] : null;
  }

  function speak(text, onEnd) {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = rate;
    var v = getVoice();
    if (v) u.voice = v;

    isPlaying = true;
    updateUI();

    u.onend = function() {
      isPlaying = false;
      updateUI();
      if (onEnd) onEnd();
    };
    u.onerror = function() {
      isPlaying = false;
      updateUI();
      if (onEnd) onEnd();
    };
    speechSynthesis.speak(u);
  }

  function playCurrent() {
    var w = DATA.words[currentIdx];
    if (!w) return;
    speak(w.jp, function() {
      if (isAutoPlaying) {
        setTimeout(playNext, 500);
      }
    });
  }

  function playNext() {
    if (currentIdx < DATA.words.length - 1) {
      currentIdx++;
      updateUI();
      playCurrent();
    } else if (isLooping) {
      currentIdx = 0;
      updateUI();
      playCurrent();
    } else {
      isAutoPlaying = false;
      isPlaying = false;
      updateUI();
    }
  }

  function playPrev() {
    if (currentIdx > 0) {
      currentIdx--;
      updateUI();
      playCurrent();
    }
  }

  function toggleAutoPlay() {
    if (isAutoPlaying) {
      isAutoPlaying = false;
      speechSynthesis.cancel();
      isPlaying = false;
      updateUI();
    } else {
      isAutoPlaying = true;
      updateUI();
      playCurrent();
    }
  }

  function togglePlay() {
    if (isPlaying) {
      speechSynthesis.cancel();
      isPlaying = false;
      isAutoPlaying = false;
      updateUI();
    } else {
      playCurrent();
    }
  }

  function selectWord(idx) {
    isAutoPlaying = false;
    currentIdx = idx;
    updateUI();
    playCurrent();
  }

  function updateUI() {
    var w = DATA.words[currentIdx];

    var np = document.querySelector('.now-playing');
    if (np) np.classList.toggle('active', isPlaying);

    var jpEl = document.querySelector('.np-japanese');
    if (jpEl) jpEl.textContent = w.jp;

    var rdEl = document.querySelector('.np-reading');
    if (rdEl) {
      rdEl.textContent = w.reading || '';
      rdEl.style.display = w.reading ? '' : 'none';
    }

    var mnEl = document.querySelector('.np-meaning');
    if (mnEl) {
      mnEl.textContent = w.meaning || '';
      mnEl.style.display = w.meaning ? '' : 'none';
    }

    var playBtn = document.getElementById('btn-play');
    if (playBtn) {
      playBtn.innerHTML = isPlaying ? '\u23F8' : '\u25B6';
      playBtn.title = isPlaying ? 'Stop' : 'Play';
    }

    var counter = document.querySelector('.np-counter');
    if (counter) counter.textContent = (currentIdx + 1) + ' / ' + DATA.words.length;

    var autoBtn = document.getElementById('btn-autoplay');
    if (autoBtn) {
      autoBtn.classList.toggle('active', isAutoPlaying);
      autoBtn.textContent = isAutoPlaying ? '\u23F9 Stop' : '\u25B6 Play All';
    }

    var loopBtn = document.getElementById('btn-loop');
    if (loopBtn) loopBtn.classList.toggle('active', isLooping);

    document.querySelectorAll('.pl-item').forEach(function(el) {
      var i = parseInt(el.dataset.idx);
      var active = i === currentIdx;
      el.classList.toggle('active', active);
      var icon = el.querySelector('.pl-icon');
      if (icon) icon.textContent = (active && isPlaying) ? '\u23F8' : '\u25B6';
    });
  }

  function render() {
    var w = DATA.words[currentIdx];
    var html = '';

    html += '<div class="now-playing">';
    html += '<div class="np-label">Now Playing</div>';
    html += '<div class="np-japanese">' + esc(w.jp) + '</div>';
    html += '<div class="np-reading"' + (w.reading ? '' : ' style="display:none"') + '>' + esc(w.reading) + '</div>';
    html += '<div class="np-meaning"' + (w.meaning ? '' : ' style="display:none"') + '>' + esc(w.meaning) + '</div>';

    html += '<div class="controls">';
    html += '<button class="btn-ctrl" id="btn-prev" title="Previous">\u23EE</button>';
    html += '<button class="btn-ctrl btn-play" id="btn-play" title="Play">\u25B6</button>';
    html += '<button class="btn-ctrl" id="btn-next" title="Next">\u23ED</button>';
    html += '</div>';
    html += '<div class="np-counter">' + (currentIdx + 1) + ' / ' + DATA.words.length + '</div>';
    html += '</div>';

    html += '<div class="settings">';

    html += '<div class="setting-row">';
    html += '<span class="setting-label">Voice</span>';
    if (jaVoices.length > 1) {
      html += '<select class="voice-select" id="voice-sel">';
      jaVoices.forEach(function(v, i) {
        var label = v.name.replace('Google ', '').replace('Microsoft ', 'MS ');
        if (v.localService) label += ' (local)';
        html += '<option value="' + i + '"' + (i === selectedVoiceIdx ? ' selected' : '') + '>' + esc(label) + '</option>';
      });
      html += '</select>';
    } else if (jaVoices.length === 1) {
      html += '<span class="voice-info" id="voice-info">' + esc(jaVoices[0].name) + '</span>';
      html += '<select class="voice-select" id="voice-sel" style="display:none"><option value="0"></option></select>';
    } else {
      html += '<span class="voice-info" id="voice-info">Loading...</span>';
      html += '<select class="voice-select" id="voice-sel" style="display:none"></select>';
    }
    html += '</div>';

    html += '<div class="setting-row">';
    html += '<span class="setting-label">Speed</span>';
    html += '<input type="range" class="speed-slider" id="speed" min="0.3" max="2.0" step="0.1" value="' + rate + '">';
    html += '<span class="speed-val" id="speed-val">' + rate.toFixed(1) + 'x</span>';
    html += '</div>';

    html += '<div class="toggle-row">';
    html += '<button class="btn-toggle" id="btn-autoplay">\u25B6 Play All</button>';
    html += '<button class="btn-toggle" id="btn-loop">\u{1F501} Loop</button>';
    html += '</div>';
    html += '</div>';

    html += '<div class="playlist-header">Playlist (' + DATA.words.length + ')</div>';
    html += '<div class="playlist">';
    DATA.words.forEach(function(w, i) {
      html += '<div class="pl-item" data-idx="' + i + '">';
      html += '<span class="pl-num">' + (i + 1) + '</span>';
      html += '<div class="pl-text">';
      html += '<div class="pl-jp">' + esc(w.jp) + '</div>';
      var sub = [];
      if (w.reading) sub.push(w.reading);
      if (w.meaning) sub.push(w.meaning);
      if (sub.length) html += '<div class="pl-sub">' + esc(sub.join(' \u00B7 ')) + '</div>';
      html += '</div>';
      html += '<div class="pl-icon">\u25B6</div>';
      html += '</div>';
    });
    html += '</div>';

    app.innerHTML = html;
    bindEvents();
  }

  function bindEvents() {
    document.getElementById('btn-play').addEventListener('click', togglePlay);

    document.getElementById('btn-prev').addEventListener('click', function() {
      isAutoPlaying = false;
      playPrev();
    });

    document.getElementById('btn-next').addEventListener('click', function() {
      isAutoPlaying = false;
      if (currentIdx < DATA.words.length - 1) {
        currentIdx++;
        updateUI();
        playCurrent();
      }
    });

    document.getElementById('voice-sel').addEventListener('change', function() {
      selectedVoiceIdx = parseInt(this.value);
    });

    document.getElementById('speed').addEventListener('input', function() {
      rate = parseFloat(this.value);
      document.getElementById('speed-val').textContent = rate.toFixed(1) + 'x';
    });

    document.getElementById('btn-autoplay').addEventListener('click', toggleAutoPlay);

    document.getElementById('btn-loop').addEventListener('click', function() {
      isLooping = !isLooping;
      updateUI();
    });

    document.querySelectorAll('.pl-item').forEach(function(el) {
      el.addEventListener('click', function() {
        selectWord(parseInt(el.dataset.idx));
      });
    });
  }

  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.addEventListener('voiceschanged', loadVoices);
  }
  loadVoices();

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'ArrowLeft') { isAutoPlaying = false; playPrev(); }
    else if (e.key === 'ArrowRight') {
      isAutoPlaying = false;
      if (currentIdx < DATA.words.length - 1) { currentIdx++; updateUI(); playCurrent(); }
    }
  });

  render();
})();
</script>
</body>
</html>
