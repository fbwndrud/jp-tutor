<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50음도</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap">
<style>
:root {
  --bg: #F5F0E8;
  --bg-elevated: #FFFDF8;
  --bg-sunken: #EDE8DE;
  --text: #2C2C2C;
  --text-secondary: #6B6560;
  --text-muted: #A09890;
  --border: #DDD6CB;
  --accent: #3D5A80;
  --accent-light: #E8EEF4;
  --vermillion: #C1440E;
  --badge-blue: #3D5A80;
  --badge-green: #4A7C59;
  --badge-yellow: #B8860B;
  --badge-red: #C1440E;
  --badge-gray: #A09890;
  --shadow: 0 2px 8px rgba(44,44,44,0.08), 0 1px 2px rgba(44,44,44,0.04);
  --shadow-lg: 0 8px 24px rgba(44,44,44,0.1), 0 2px 8px rgba(44,44,44,0.06);
  --radius: 12px;
  --radius-sm: 8px;
  --font-display: 'Shippori Mincho', serif;
  --font-body: 'Noto Sans JP', sans-serif;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1A1A24;
    --bg-elevated: #24243A;
    --bg-sunken: #14141E;
    --text: #E8E4DC;
    --text-secondary: #A09890;
    --text-muted: #6B6560;
    --border: #33334A;
    --accent: #7BA3CC;
    --accent-light: #252540;
    --shadow: 0 2px 8px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  background-image: var(--grain);
  color: var(--text);
  line-height: 1.5;
  padding: 20px 16px;
}

.container { max-width: 720px; margin: 0 auto; }

h1 {
  text-align: center;
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.subtitle {
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.8rem;
  margin-bottom: 18px;
  letter-spacing: 0.5px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 18px;
  background: var(--bg-sunken);
  border-radius: var(--radius-sm);
  padding: 3px;
  border: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 9px;
  text-align: center;
  font-size: 0.82rem;
  font-weight: 600;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.25s ease;
  font-family: var(--font-body);
  letter-spacing: 0.3px;
}

.tab.active {
  background: var(--bg-elevated);
  color: var(--text);
  box-shadow: var(--shadow);
}

/* Stats */
.stats {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.stat-item {
  flex: 1;
  min-width: 80px;
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  padding: 12px 10px;
  text-align: center;
  border: 1.5px solid var(--border);
}

.stat-value {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
}

.stat-label {
  font-size: 0.68rem;
  color: var(--text-secondary);
  margin-top: 2px;
  letter-spacing: 0.5px;
}

/* Progress */
.progress-section { margin-bottom: 18px; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  color: var(--text-secondary);
}

.progress-bar-wrap {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
  background: linear-gradient(90deg, var(--accent), var(--vermillion));
}

/* Chart grid */
.chart {
  background: var(--bg-elevated);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 18px;
}

.chart-row {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.chart-row:last-child { border-bottom: none; }

.chart-row.header { background: var(--bg-sunken); }

.chart-cell {
  flex: 1;
  padding: 9px 4px;
  text-align: center;
  min-width: 0;
  border-right: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background 0.15s ease;
}

.chart-cell:hover { background: var(--accent-light); }
.chart-cell:last-child { border-right: none; }

.chart-cell.row-label {
  flex: 0 0 40px;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-sunken);
  cursor: default;
  letter-spacing: 0.5px;
}

.chart-cell .kana {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 700;
  line-height: 1.2;
}

.chart-cell .romaji {
  font-size: 0.58rem;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

.chart-cell.locked .kana { color: var(--text-muted); }

.chart-cell .badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin: 3px auto 0;
}

.chart-cell.empty { background: transparent; cursor: default; }
.chart-cell.empty:hover { background: transparent; }

/* Detail popup */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,44,44,0.35);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.detail-overlay.show { display: flex; }

.detail-card {
  background: var(--bg-elevated);
  border-radius: 16px;
  padding: 36px 28px;
  max-width: 320px;
  width: 90%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  border: 1.5px solid var(--border);
}

.detail-kana {
  font-family: var(--font-display);
  font-size: 4.5rem;
  font-weight: 800;
  line-height: 1.1;
}

.detail-romaji {
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-weight: 300;
}

.detail-info {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.detail-word {
  font-size: 0.95rem;
  margin-top: 10px;
  padding: 10px;
  background: var(--bg-sunken);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.detail-speak {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 11px 22px;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  margin-top: 14px;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(61,90,128,0.25);
}

.detail-speak:hover { opacity: 0.85; transform: translateY(-1px); }
.detail-speak.speaking { animation: pulse 1.5s ease-in-out infinite; }

.detail-close {
  margin-top: 12px;
  padding: 8px 24px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s;
}

.detail-close:hover { border-color: var(--accent); color: var(--accent); }

/* TTS Settings */
.tts-settings {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  font-size: 0.78rem;
  color: var(--text-secondary);
  flex-wrap: wrap;
}

.tts-settings select {
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--bg-elevated);
  color: var(--text);
  font-size: 0.78rem;
  font-family: var(--font-body);
  outline: none;
  max-width: 160px;
}

.tts-settings select:focus { border-color: var(--accent); }

.tts-settings input[type="range"] {
  width: 70px;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

.tts-settings input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(61,90,128,0.25);
}

.tts-settings .speed-val {
  font-weight: 600;
  min-width: 28px;
  font-variant-numeric: tabular-nums;
}

/* Legend */
.legend {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  font-size: 0.72rem;
  color: var(--text-secondary);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.container > * {
  animation: slideUp 0.4s ease-out both;
}
.container > *:nth-child(2) { animation-delay: 0.04s; }
.container > *:nth-child(3) { animation-delay: 0.08s; }
.container > *:nth-child(4) { animation-delay: 0.12s; }
.container > *:nth-child(5) { animation-delay: 0.16s; }

@media (max-width: 480px) {
  .chart-cell .kana { font-size: 1rem; }
  .chart-cell .romaji { font-size: 0.48rem; }
  .chart-cell { padding: 7px 2px; }
  .chart-cell.row-label { flex: 0 0 30px; font-size: 0.58rem; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const DATA = null;

;(function() {
  var app = document.getElementById('app');

  if (!DATA) {
    app.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-secondary);font-family:var(--font-display)">데이터를 불러오는 중...</p>';
    return;
  }

  var currentTab = 'hiragana';

  var hasTTS = 'speechSynthesis' in window;
  var jaVoices = [];
  var selectedVoiceIdx = 0;
  var ttsRate = 0.7;

  function loadVoices() {
    if (!hasTTS) return;
    var all = speechSynthesis.getVoices();
    jaVoices = all.filter(function(v) { return v.lang && v.lang.startsWith('ja'); });
    if (jaVoices.length === 0) {
      jaVoices = all.filter(function(v) { return v.lang && v.lang.indexOf('ja') !== -1; });
    }
    var sel = document.getElementById('voice-sel');
    if (sel && jaVoices.length > 0) {
      sel.innerHTML = '';
      jaVoices.forEach(function(v, i) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = v.name.replace('Google ', '').replace('Microsoft ', 'MS ');
        if (i === selectedVoiceIdx) opt.selected = true;
        sel.appendChild(opt);
      });
    }
  }

  function speakKana(text) {
    if (!hasTTS || !text) return;
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = ttsRate;
    if (jaVoices.length > 0) u.voice = jaVoices[selectedVoiceIdx];
    var btn = document.getElementById('detail-speak-btn');
    if (btn) btn.classList.add('speaking');
    u.onend = function() {
      var b = document.getElementById('detail-speak-btn');
      if (b) b.classList.remove('speaking');
    };
    u.onerror = u.onend;
    speechSynthesis.speak(u);
  }

  if (hasTTS) {
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.addEventListener('voiceschanged', loadVoices);
    }
    loadVoices();
  }

  var HIRAGANA_CHART = [
    { label: '', row: ['a','i','u','e','o'], header: true },
    { label: '-', row: [['あ','a'],['い','i'],['う','u'],['え','e'],['お','o']] },
    { label: 'k', row: [['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko']] },
    { label: 's', row: [['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so']] },
    { label: 't', row: [['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to']] },
    { label: 'n', row: [['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no']] },
    { label: 'h', row: [['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']] },
    { label: 'm', row: [['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo']] },
    { label: 'y', row: [['や','ya'],null,['ゆ','yu'],null,['よ','yo']] },
    { label: 'r', row: [['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro']] },
    { label: 'w', row: [['わ','wa'],null,null,null,['を','wo']] },
    { label: 'N', row: [['ん','n'],null,null,null,null] }
  ];

  var KATAKANA_CHART = [
    { label: '', row: ['a','i','u','e','o'], header: true },
    { label: '-', row: [['ア','a'],['イ','i'],['ウ','u'],['エ','e'],['オ','o']] },
    { label: 'k', row: [['カ','ka'],['キ','ki'],['ク','ku'],['ケ','ke'],['コ','ko']] },
    { label: 's', row: [['サ','sa'],['シ','shi'],['ス','su'],['セ','se'],['ソ','so']] },
    { label: 't', row: [['タ','ta'],['チ','chi'],['ツ','tsu'],['テ','te'],['ト','to']] },
    { label: 'n', row: [['ナ','na'],['ニ','ni'],['ヌ','nu'],['ネ','ne'],['ノ','no']] },
    { label: 'h', row: [['ハ','ha'],['ヒ','hi'],['フ','fu'],['ヘ','he'],['ホ','ho']] },
    { label: 'm', row: [['マ','ma'],['ミ','mi'],['ム','mu'],['メ','me'],['モ','mo']] },
    { label: 'y', row: [['ヤ','ya'],null,['ユ','yu'],null,['ヨ','yo']] },
    { label: 'r', row: [['ラ','ra'],['リ','ri'],['ル','ru'],['レ','re'],['ロ','ro']] },
    { label: 'w', row: [['ワ','wa'],null,null,null,['ヲ','wo']] },
    { label: 'N', row: [['ン','n'],null,null,null,null] }
  ];

  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function getBadgeColor(concept) {
    if (!concept || concept.attempts === 0) return null;
    var rate = concept.correct / concept.attempts;
    if (concept.attempts >= 3) {
      if (rate >= 0.8) return 'var(--badge-blue)';
      if (rate >= 0.6) return 'var(--badge-green)';
    }
    if (rate >= 0.4) return 'var(--badge-yellow)';
    return 'var(--badge-red)';
  }

  function getStats(type) {
    var suffix = type === 'hiragana' ? '_hira' : '_kata';
    var concepts = DATA.concepts || {};
    var total = 0, learned = 0, mastered = 0;
    var chart = type === 'hiragana' ? HIRAGANA_CHART : KATAKANA_CHART;
    chart.forEach(function(r) {
      if (r.header) return;
      r.row.forEach(function(cell) {
        if (!cell) return;
        total++;
        var key = cell[0] + suffix;
        var c = concepts[key];
        if (c && c.attempts > 0) {
          learned++;
          if (c.attempts >= 3 && c.correct / c.attempts >= 0.8) mastered++;
        }
      });
    });
    return { total: total, learned: learned, mastered: mastered };
  }

  function renderChart(chart, type) {
    var suffix = type === 'hiragana' ? '_hira' : '_kata';
    var concepts = DATA.concepts || {};
    var html = '<div class="chart">';

    chart.forEach(function(r) {
      html += '<div class="chart-row' + (r.header ? ' header' : '') + '">';
      html += '<div class="chart-cell row-label">' + esc(r.label) + '</div>';

      r.row.forEach(function(cell) {
        if (r.header) {
          html += '<div class="chart-cell" style="font-weight:700;font-size:0.72rem;cursor:default">' + esc(cell) + '</div>';
          return;
        }
        if (!cell) {
          html += '<div class="chart-cell empty"></div>';
          return;
        }

        var kana = cell[0], romaji = cell[1];
        var key = kana + suffix;
        var c = concepts[key];
        var badgeColor = getBadgeColor(c);
        var locked = !c || c.attempts === 0;

        html += '<div class="chart-cell' + (locked ? ' locked' : '') + '" data-kana="' + esc(kana) + '" data-type="' + type + '">';
        html += '<div class="kana">' + esc(kana) + '</div>';
        html += '<div class="romaji">' + esc(romaji) + '</div>';
        if (badgeColor) {
          html += '<div class="badge-dot" style="background:' + badgeColor + '"></div>';
        }
        html += '</div>';
      });

      html += '</div>';
    });

    html += '</div>';
    return html;
  }

  function render() {
    var hStats = getStats('hiragana');
    var kStats = getStats('katakana');
    var stats = currentTab === 'hiragana' ? hStats : kStats;

    var html = '';
    html += '<h1>50音図</h1>';
    html += '<div class="subtitle">히라가나 Stage ' + (DATA.hiraStage || 1) + ' · 카타카나 Stage ' + (DATA.kataStage || 0) + '</div>';

    html += '<div class="tabs">';
    html += '<button class="tab' + (currentTab === 'hiragana' ? ' active' : '') + '" data-tab="hiragana">히라가나</button>';
    html += '<button class="tab' + (currentTab === 'katakana' ? ' active' : '') + '" data-tab="katakana">카타카나</button>';
    html += '</div>';

    html += '<div class="stats">';
    html += '<div class="stat-item"><div class="stat-value">' + stats.learned + '/' + stats.total + '</div><div class="stat-label">학습</div></div>';
    html += '<div class="stat-item"><div class="stat-value">' + stats.mastered + '</div><div class="stat-label">마스터</div></div>';
    var pct = stats.total > 0 ? Math.round(stats.learned / stats.total * 100) : 0;
    html += '<div class="stat-item"><div class="stat-value">' + pct + '%</div><div class="stat-label">진행률</div></div>';
    html += '</div>';

    html += '<div class="progress-section">';
    html += '<div class="progress-label"><span>' + (currentTab === 'hiragana' ? '히라가나' : '카타카나') + ' 진행률</span><span>' + pct + '%</span></div>';
    html += '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>';
    html += '</div>';

    if (currentTab === 'hiragana') {
      html += renderChart(HIRAGANA_CHART, 'hiragana');
    } else {
      html += renderChart(KATAKANA_CHART, 'katakana');
    }

    if (hasTTS) {
      html += '<div class="tts-settings">';
      html += '<span>Voice</span>';
      if (jaVoices.length > 1) {
        html += '<select id="voice-sel">';
        jaVoices.forEach(function(v, i) {
          var label = v.name.replace('Google ', '').replace('Microsoft ', 'MS ');
          html += '<option value="' + i + '"' + (i === selectedVoiceIdx ? ' selected' : '') + '>' + esc(label) + '</option>';
        });
        html += '</select>';
      } else if (jaVoices.length === 1) {
        html += '<span>' + esc(jaVoices[0].name.replace('Google ', '')) + '</span>';
        html += '<select id="voice-sel" style="display:none"><option value="0"></option></select>';
      } else {
        html += '<span style="font-style:italic">loading...</span>';
        html += '<select id="voice-sel" style="display:none"></select>';
      }
      html += '<span style="margin-left:auto">Speed</span>';
      html += '<input type="range" id="tts-speed" min="0.3" max="2.0" step="0.1" value="' + ttsRate + '">';
      html += '<span class="speed-val" id="tts-speed-val">' + ttsRate.toFixed(1) + 'x</span>';
      html += '</div>';
    }

    html += '<div class="legend" style="margin-top:14px">';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-blue)"></div>마스터</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-green)"></div>숙련</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-yellow)"></div>학습중</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-red)"></div>보강</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-gray)"></div>미학습</div>';
    html += '</div>';

    app.innerHTML = html;

    var overlay = document.createElement('div');
    overlay.className = 'detail-overlay';
    overlay.id = 'detail';
    overlay.innerHTML = '<div class="detail-card" id="detail-card"></div>';
    document.body.appendChild(overlay);

    bindEvents();
  }

  function showDetail(kana, type) {
    var suffix = type === 'hiragana' ? '_hira' : '_kata';
    var key = kana + suffix;
    var c = (DATA.concepts || {})[key];
    var word = (DATA.words || {})[kana] || '';

    var card = document.getElementById('detail-card');
    var html = '<div class="detail-kana">' + esc(kana) + '</div>';

    if (c && c.attempts > 0) {
      var rate = Math.round(c.correct / c.attempts * 100);
      var badgeColor = getBadgeColor(c);
      html += '<div class="detail-info" style="margin-top:8px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + badgeColor + ';margin-right:4px;vertical-align:middle"></span>' + rate + '% (' + c.correct + '/' + c.attempts + ')</div>';
    } else {
      html += '<div class="detail-info" style="margin-top:8px">미학습</div>';
    }

    if (word) {
      html += '<div class="detail-word">' + esc(word) + '</div>';
    }

    if (hasTTS) {
      html += '<button class="detail-speak" id="detail-speak-btn" data-kana="' + esc(kana) + '">발음 듣기</button>';
    }
    html += '<button class="detail-close" onclick="document.getElementById(\'detail\').classList.remove(\'show\')">닫기</button>';
    card.innerHTML = html;
    document.getElementById('detail').classList.add('show');
  }

  function bindEvents() {
    document.querySelectorAll('.tab').forEach(function(t) {
      t.addEventListener('click', function() {
        currentTab = t.dataset.tab;
        var old = document.getElementById('detail');
        if (old) old.remove();
        render();
      });
    });

    document.querySelectorAll('.chart-cell[data-kana]').forEach(function(cell) {
      cell.addEventListener('click', function() {
        showDetail(cell.dataset.kana, cell.dataset.type);
      });
    });

    var overlay = document.getElementById('detail');
    if (overlay) {
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.classList.remove('show');
      });
    }

    var voiceSel = document.getElementById('voice-sel');
    if (voiceSel) voiceSel.addEventListener('change', function() {
      selectedVoiceIdx = parseInt(voiceSel.value);
    });
    var ttsSpeed = document.getElementById('tts-speed');
    if (ttsSpeed) ttsSpeed.addEventListener('input', function() {
      ttsRate = parseFloat(ttsSpeed.value);
      document.getElementById('tts-speed-val').textContent = ttsRate.toFixed(1) + 'x';
    });
    var speakBtn = document.getElementById('detail-speak-btn');
    if (speakBtn) speakBtn.addEventListener('click', function() {
      speakKana(speakBtn.dataset.kana);
    });
  }

  render();
})();
</script>
</body>
</html>
