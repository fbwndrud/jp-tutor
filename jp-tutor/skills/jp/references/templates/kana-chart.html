<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50음도</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap">
<style>
:root {
  --bg: #FBF7FF;
  --bg-elevated: #FFFFFF;
  --bg-sunken: #F3EEFF;
  --text: #4A4458;
  --text-secondary: #8B82A0;
  --text-muted: #B5AECA;
  --border: #E8E0F4;
  --accent: #9B7FD4;
  --accent-light: #F3EEFF;
  --pink: #F2A5B7;
  --mint: #7EC8A8;
  --peach: #F4B183;
  --coral: #E88B8B;
  --badge-blue: #9B7FD4;
  --badge-green: #7EC8A8;
  --badge-yellow: #F4B183;
  --badge-red: #E88B8B;
  --badge-gray: #CAC3D8;
  --shadow: 0 4px 16px rgba(155,127,212,0.1), 0 1px 4px rgba(155,127,212,0.06);
  --shadow-lg: 0 8px 32px rgba(155,127,212,0.14), 0 2px 8px rgba(155,127,212,0.08);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-pill: 999px;
  --font-display: 'Zen Maru Gothic', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1E1B2E;
    --bg-elevated: #2A2640;
    --bg-sunken: #16142A;
    --text: #E8E2F4;
    --text-secondary: #A99FC0;
    --text-muted: #756B90;
    --border: #3D3658;
    --accent: #B9A0E8;
    --accent-light: #2A2640;
    --pink: #E8899E;
    --mint: #6DB894;
    --peach: #E0A070;
    --coral: #D47878;
    --badge-blue: #B9A0E8;
    --badge-green: #6DB894;
    --badge-yellow: #E0A070;
    --badge-red: #D47878;
    --badge-gray: #5A5370;
    --shadow: 0 4px 16px rgba(0,0,0,0.25), 0 1px 4px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(155,127,212,0.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 70% 80%, rgba(242,165,183,0.05) 0%, transparent 60%);
  background-attachment: fixed;
  color: var(--text);
  line-height: 1.5;
  padding: 24px 16px;
  min-height: 100vh;
}

.container { max-width: 720px; margin: 0 auto; }

h1 {
  text-align: center;
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 900;
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.subtitle {
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 400;
  margin-bottom: 20px;
  letter-spacing: 0.3px;
}

/* Tabs — pill segments */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--bg-sunken);
  border-radius: var(--radius-pill);
  padding: 4px;
  border: 1.5px solid var(--border);
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 700;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: var(--radius-pill);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: var(--font-display);
  letter-spacing: 0.3px;
}

.tab:hover {
  color: var(--text);
}

.tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px rgba(155,127,212,0.3);
  transform: scale(1.02);
}

/* Stats — cute rounded cards */
.stats {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.stat-item {
  flex: 1;
  min-width: 90px;
  background: var(--bg-elevated);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: transform 0.2s ease;
}

.stat-item:hover {
  transform: translateY(-2px);
}

.stat-value {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
}

.stat-label {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-top: 4px;
  letter-spacing: 0.5px;
}

/* Progress bar */
.progress-section { margin-bottom: 20px; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.progress-bar-wrap {
  height: 10px;
  background: var(--bg-sunken);
  border-radius: var(--radius-pill);
  overflow: hidden;
  margin-top: 8px;
  border: 1px solid var(--border);
}

.progress-bar-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: linear-gradient(90deg, var(--accent), var(--pink));
}

/* Chart grid — bento box */
.chart {
  background: var(--bg-elevated);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  padding: 6px;
}

.chart-row {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}

.chart-row:last-child { margin-bottom: 0; }

.chart-row.header { background: transparent; }

.chart-cell {
  flex: 1;
  padding: 10px 4px;
  text-align: center;
  min-width: 0;
  position: relative;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: var(--bg-sunken);
  border: 1px solid transparent;
}

.chart-cell:hover {
  background: var(--accent-light);
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(155,127,212,0.15);
  border-color: var(--accent);
  z-index: 2;
}

.chart-cell.row-label {
  flex: 0 0 40px;
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  cursor: default;
  letter-spacing: 0.5px;
  border: none;
}

.chart-cell.row-label:hover {
  transform: none;
  box-shadow: none;
  border-color: transparent;
}

.chart-cell .kana {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 700;
  line-height: 1.2;
}

.chart-cell .romaji {
  font-size: 0.58rem;
  color: var(--text-muted);
  letter-spacing: 0.3px;
  font-weight: 400;
}

.chart-cell.locked .kana { color: var(--text-muted); }

.chart-cell .badge-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin: 4px auto 0;
}

.chart-cell.empty {
  background: transparent;
  cursor: default;
  border: none;
}
.chart-cell.empty:hover {
  background: transparent;
  transform: none;
  box-shadow: none;
  border-color: transparent;
}

/* Detail overlay */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(74,68,88,0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.detail-overlay.show { display: flex; }

.detail-card {
  background: var(--bg-elevated);
  border-radius: 24px;
  padding: 40px 32px;
  max-width: 320px;
  width: 90%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  border: 1.5px solid var(--border);
  animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.detail-kana {
  font-family: var(--font-display);
  font-size: 5rem;
  font-weight: 900;
  line-height: 1.1;
  color: var(--accent);
}

.detail-romaji {
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-weight: 300;
}

.detail-info {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-weight: 500;
}

.detail-word {
  font-size: 0.95rem;
  margin-top: 10px;
  padding: 12px;
  background: var(--bg-sunken);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-weight: 400;
}

.detail-speak {
  background: linear-gradient(135deg, var(--accent), var(--pink));
  color: #fff;
  border: none;
  border-radius: var(--radius-pill);
  padding: 12px 28px;
  font-size: 0.85rem;
  font-weight: 700;
  font-family: var(--font-display);
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 16px rgba(155,127,212,0.3);
}

.detail-speak:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 6px 20px rgba(155,127,212,0.35); }
.detail-speak.speaking { animation: pulse 1.5s ease-in-out infinite; }

.detail-close {
  margin-top: 12px;
  padding: 9px 28px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  background: var(--bg);
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 500;
  font-family: var(--font-display);
  cursor: pointer;
  transition: all 0.2s ease;
}

.detail-close:hover { border-color: var(--accent); color: var(--accent); }

/* TTS Settings */
.tts-settings {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-secondary);
  flex-wrap: wrap;
  background: var(--bg-elevated);
  padding: 14px 18px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
}

.tts-settings select {
  padding: 7px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-sunken);
  color: var(--text);
  font-size: 0.78rem;
  font-family: var(--font-body);
  outline: none;
  max-width: 160px;
  transition: border-color 0.2s ease;
}

.tts-settings select:focus { border-color: var(--accent); }

.tts-settings input[type="range"] {
  width: 75px;
  -webkit-appearance: none;
  height: 5px;
  background: var(--bg-sunken);
  border-radius: var(--radius-pill);
  outline: none;
  border: 1px solid var(--border);
}

.tts-settings input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(155,127,212,0.3);
  border: 2px solid var(--bg-elevated);
  transition: transform 0.2s ease;
}

.tts-settings input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}

.tts-settings .speed-val {
  font-weight: 700;
  min-width: 28px;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  font-size: 0.74rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.9) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes bounceIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.container > * {
  animation: bounceIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.container > *:nth-child(2) { animation-delay: 0.05s; }
.container > *:nth-child(3) { animation-delay: 0.1s; }
.container > *:nth-child(4) { animation-delay: 0.15s; }
.container > *:nth-child(5) { animation-delay: 0.2s; }
.container > *:nth-child(6) { animation-delay: 0.25s; }
.container > *:nth-child(7) { animation-delay: 0.3s; }
.container > *:nth-child(8) { animation-delay: 0.35s; }

@media (max-width: 480px) {
  .chart-cell .kana { font-size: 1rem; }
  .chart-cell .romaji { font-size: 0.48rem; }
  .chart-cell { padding: 7px 2px; }
  .chart-cell.row-label { flex: 0 0 30px; font-size: 0.58rem; }
  .chart { padding: 4px; }
  .chart-row { gap: 3px; margin-bottom: 3px; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const DATA = null;

;(function() {
  var app = document.getElementById('app');

  if (!DATA) {
    app.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-secondary);font-family:var(--font-display)">데이터를 불러오는 중...</p>';
    return;
  }

  var currentTab = 'hiragana';

  var hasTTS = 'speechSynthesis' in window;
  var jaVoices = [];
  var selectedVoiceIdx = 0;
  var ttsRate = 0.7;

  function sortVoices(voices) {
    var preferred = ['kyoko', 'otoya', 'o-ren', 'hattori'];
    voices.sort(function(a, b) {
      var aLocal = a.localService ? 0 : 1;
      var bLocal = b.localService ? 0 : 1;
      if (aLocal !== bLocal) return aLocal - bLocal;
      var aName = a.name.toLowerCase();
      var bName = b.name.toLowerCase();
      var aIdx = -1, bIdx = -1;
      for (var i = 0; i < preferred.length; i++) {
        if (aName.indexOf(preferred[i]) !== -1) { aIdx = i; break; }
      }
      for (var i = 0; i < preferred.length; i++) {
        if (bName.indexOf(preferred[i]) !== -1) { bIdx = i; break; }
      }
      if (aIdx !== -1 && bIdx === -1) return -1;
      if (aIdx === -1 && bIdx !== -1) return 1;
      if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
      return aName.localeCompare(bName);
    });
    return voices;
  }

  function loadVoices() {
    if (!hasTTS) return;
    var all = speechSynthesis.getVoices();
    jaVoices = all.filter(function(v) { return v.lang && v.lang.startsWith('ja'); });
    if (jaVoices.length === 0) {
      jaVoices = all.filter(function(v) { return v.lang && v.lang.indexOf('ja') !== -1; });
    }
    jaVoices = sortVoices(jaVoices);
    var sel = document.getElementById('voice-sel');
    if (sel && jaVoices.length > 0) {
      sel.innerHTML = '';
      jaVoices.forEach(function(v, i) {
        var opt = document.createElement('option');
        opt.value = i;
        var label = v.name.replace('Google ', '').replace('Microsoft ', 'MS ');
        if (v.localService) label = '★ ' + label;
        opt.textContent = label;
        if (i === selectedVoiceIdx) opt.selected = true;
        sel.appendChild(opt);
      });
    }
  }

  function speakKana(text) {
    if (!hasTTS || !text) return;
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = ttsRate;
    if (jaVoices.length > 0) u.voice = jaVoices[selectedVoiceIdx];
    var btn = document.getElementById('detail-speak-btn');
    if (btn) btn.classList.add('speaking');
    u.onend = function() {
      var b = document.getElementById('detail-speak-btn');
      if (b) b.classList.remove('speaking');
    };
    u.onerror = u.onend;
    speechSynthesis.speak(u);
  }

  if (hasTTS) {
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.addEventListener('voiceschanged', loadVoices);
    }
    loadVoices();
  }

  var HIRAGANA_CHART = [
    { label: '', row: ['a','i','u','e','o'], header: true },
    { label: '-', row: [['あ','a'],['い','i'],['う','u'],['え','e'],['お','o']] },
    { label: 'k', row: [['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko']] },
    { label: 's', row: [['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so']] },
    { label: 't', row: [['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to']] },
    { label: 'n', row: [['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no']] },
    { label: 'h', row: [['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']] },
    { label: 'm', row: [['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo']] },
    { label: 'y', row: [['や','ya'],null,['ゆ','yu'],null,['よ','yo']] },
    { label: 'r', row: [['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro']] },
    { label: 'w', row: [['わ','wa'],null,null,null,['を','wo']] },
    { label: 'N', row: [['ん','n'],null,null,null,null] }
  ];

  var KATAKANA_CHART = [
    { label: '', row: ['a','i','u','e','o'], header: true },
    { label: '-', row: [['ア','a'],['イ','i'],['ウ','u'],['エ','e'],['オ','o']] },
    { label: 'k', row: [['カ','ka'],['キ','ki'],['ク','ku'],['ケ','ke'],['コ','ko']] },
    { label: 's', row: [['サ','sa'],['シ','shi'],['ス','su'],['セ','se'],['ソ','so']] },
    { label: 't', row: [['タ','ta'],['チ','chi'],['ツ','tsu'],['テ','te'],['ト','to']] },
    { label: 'n', row: [['ナ','na'],['ニ','ni'],['ヌ','nu'],['ネ','ne'],['ノ','no']] },
    { label: 'h', row: [['ハ','ha'],['ヒ','hi'],['フ','fu'],['ヘ','he'],['ホ','ho']] },
    { label: 'm', row: [['マ','ma'],['ミ','mi'],['ム','mu'],['メ','me'],['モ','mo']] },
    { label: 'y', row: [['ヤ','ya'],null,['ユ','yu'],null,['ヨ','yo']] },
    { label: 'r', row: [['ラ','ra'],['リ','ri'],['ル','ru'],['レ','re'],['ロ','ro']] },
    { label: 'w', row: [['ワ','wa'],null,null,null,['ヲ','wo']] },
    { label: 'N', row: [['ン','n'],null,null,null,null] }
  ];

  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function getBadgeColor(concept) {
    if (!concept || concept.attempts === 0) return null;
    var rate = concept.correct / concept.attempts;
    if (concept.attempts >= 3) {
      if (rate >= 0.8) return 'var(--badge-blue)';
      if (rate >= 0.6) return 'var(--badge-green)';
    }
    if (rate >= 0.4) return 'var(--badge-yellow)';
    return 'var(--badge-red)';
  }

  function getStats(type) {
    var suffix = type === 'hiragana' ? '_hira' : '_kata';
    var concepts = DATA.concepts || {};
    var total = 0, learned = 0, mastered = 0;
    var chart = type === 'hiragana' ? HIRAGANA_CHART : KATAKANA_CHART;
    chart.forEach(function(r) {
      if (r.header) return;
      r.row.forEach(function(cell) {
        if (!cell) return;
        total++;
        var key = cell[0] + suffix;
        var c = concepts[key];
        if (c && c.attempts > 0) {
          learned++;
          if (c.attempts >= 3 && c.correct / c.attempts >= 0.8) mastered++;
        }
      });
    });
    return { total: total, learned: learned, mastered: mastered };
  }

  function renderChart(chart, type) {
    var suffix = type === 'hiragana' ? '_hira' : '_kata';
    var concepts = DATA.concepts || {};
    var html = '<div class="chart">';

    chart.forEach(function(r) {
      html += '<div class="chart-row' + (r.header ? ' header' : '') + '">';
      html += '<div class="chart-cell row-label">' + esc(r.label) + '</div>';

      r.row.forEach(function(cell) {
        if (r.header) {
          html += '<div class="chart-cell" style="font-weight:700;font-size:0.72rem;cursor:default;background:transparent;font-family:var(--font-display);color:var(--accent)">' + esc(cell) + '</div>';
          return;
        }
        if (!cell) {
          html += '<div class="chart-cell empty"></div>';
          return;
        }

        var kana = cell[0], romaji = cell[1];
        var key = kana + suffix;
        var c = concepts[key];
        var badgeColor = getBadgeColor(c);
        var locked = !c || c.attempts === 0;

        html += '<div class="chart-cell' + (locked ? ' locked' : '') + '" data-kana="' + esc(kana) + '" data-type="' + type + '">';
        html += '<div class="kana">' + esc(kana) + '</div>';
        html += '<div class="romaji">' + esc(romaji) + '</div>';
        if (badgeColor) {
          html += '<div class="badge-dot" style="background:' + badgeColor + '"></div>';
        }
        html += '</div>';
      });

      html += '</div>';
    });

    html += '</div>';
    return html;
  }

  function render() {
    var hStats = getStats('hiragana');
    var kStats = getStats('katakana');
    var stats = currentTab === 'hiragana' ? hStats : kStats;

    var html = '';
    html += '<h1>50音図</h1>';
    html += '<div class="subtitle">히라가나 Stage ' + (DATA.hiraStage || 1) + ' · 카타카나 Stage ' + (DATA.kataStage || 0) + '</div>';

    html += '<div class="tabs">';
    html += '<button class="tab' + (currentTab === 'hiragana' ? ' active' : '') + '" data-tab="hiragana">히라가나</button>';
    html += '<button class="tab' + (currentTab === 'katakana' ? ' active' : '') + '" data-tab="katakana">카타카나</button>';
    html += '</div>';

    html += '<div class="stats">';
    html += '<div class="stat-item"><div class="stat-value">' + stats.learned + '/' + stats.total + '</div><div class="stat-label">학습</div></div>';
    html += '<div class="stat-item"><div class="stat-value">' + stats.mastered + '</div><div class="stat-label">마스터</div></div>';
    var pct = stats.total > 0 ? Math.round(stats.learned / stats.total * 100) : 0;
    html += '<div class="stat-item"><div class="stat-value">' + pct + '%</div><div class="stat-label">진행률</div></div>';
    html += '</div>';

    html += '<div class="progress-section">';
    html += '<div class="progress-label"><span>' + (currentTab === 'hiragana' ? '히라가나' : '카타카나') + ' 진행률</span><span>' + pct + '%</span></div>';
    html += '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>';
    html += '</div>';

    if (currentTab === 'hiragana') {
      html += renderChart(HIRAGANA_CHART, 'hiragana');
    } else {
      html += renderChart(KATAKANA_CHART, 'katakana');
    }

    if (hasTTS) {
      html += '<div class="tts-settings">';
      html += '<span>Voice</span>';
      html += '<select id="voice-sel">';
      if (jaVoices.length > 0) {
        jaVoices.forEach(function(v, i) {
          var label = v.name.replace('Google ', '').replace('Microsoft ', 'MS ');
          if (v.localService) label = '★ ' + label;
          html += '<option value="' + i + '"' + (i === selectedVoiceIdx ? ' selected' : '') + '>' + esc(label) + '</option>';
        });
      } else {
        html += '<option value="">loading...</option>';
      }
      html += '</select>';
      html += '<span style="margin-left:auto">Speed</span>';
      html += '<input type="range" id="tts-speed" min="0.3" max="2.0" step="0.1" value="' + ttsRate + '">';
      html += '<span class="speed-val" id="tts-speed-val">' + ttsRate.toFixed(1) + 'x</span>';
      html += '</div>';
    }

    html += '<div class="legend" style="margin-top:14px">';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-blue)"></div>마스터</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-green)"></div>숙련</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-yellow)"></div>학습중</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-red)"></div>보강</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-gray)"></div>미학습</div>';
    html += '</div>';

    app.innerHTML = html;

    var overlay = document.createElement('div');
    overlay.className = 'detail-overlay';
    overlay.id = 'detail';
    overlay.innerHTML = '<div class="detail-card" id="detail-card"></div>';
    document.body.appendChild(overlay);

    bindEvents();
  }

  function showDetail(kana, type) {
    var suffix = type === 'hiragana' ? '_hira' : '_kata';
    var key = kana + suffix;
    var c = (DATA.concepts || {})[key];
    var word = (DATA.words || {})[kana] || '';

    var card = document.getElementById('detail-card');
    var html = '<div class="detail-kana">' + esc(kana) + '</div>';

    if (c && c.attempts > 0) {
      var rate = Math.round(c.correct / c.attempts * 100);
      var badgeColor = getBadgeColor(c);
      html += '<div class="detail-info" style="margin-top:8px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + badgeColor + ';margin-right:4px;vertical-align:middle"></span>' + rate + '% (' + c.correct + '/' + c.attempts + ')</div>';
    } else {
      html += '<div class="detail-info" style="margin-top:8px">미학습</div>';
    }

    if (word) {
      html += '<div class="detail-word">' + esc(word) + '</div>';
    }

    if (hasTTS) {
      html += '<button class="detail-speak" id="detail-speak-btn" data-kana="' + esc(kana) + '">발음 듣기</button>';
    }
    html += '<button class="detail-close" onclick="document.getElementById(\'detail\').classList.remove(\'show\')">닫기</button>';
    card.innerHTML = html;
    document.getElementById('detail').classList.add('show');
  }

  function bindEvents() {
    document.querySelectorAll('.tab').forEach(function(t) {
      t.addEventListener('click', function() {
        currentTab = t.dataset.tab;
        var old = document.getElementById('detail');
        if (old) old.remove();
        render();
      });
    });

    document.querySelectorAll('.chart-cell[data-kana]').forEach(function(cell) {
      cell.addEventListener('click', function() {
        showDetail(cell.dataset.kana, cell.dataset.type);
      });
    });

    var overlay = document.getElementById('detail');
    if (overlay) {
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.classList.remove('show');
      });
    }

    var voiceSel = document.getElementById('voice-sel');
    if (voiceSel) voiceSel.addEventListener('change', function() {
      selectedVoiceIdx = parseInt(voiceSel.value);
    });
    var ttsSpeed = document.getElementById('tts-speed');
    if (ttsSpeed) ttsSpeed.addEventListener('input', function() {
      ttsRate = parseFloat(ttsSpeed.value);
      document.getElementById('tts-speed-val').textContent = ttsRate.toFixed(1) + 'x';
    });
    var speakBtn = document.getElementById('detail-speak-btn');
    if (speakBtn) speakBtn.addEventListener('click', function() {
      speakKana(speakBtn.dataset.kana);
    });
  }

  render();
})();
</script>
</body>
</html>
