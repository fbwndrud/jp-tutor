<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 학습 대시보드</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap">
<style>
:root {
  --bg: #FBF7FF;
  --bg-elevated: #FFFFFF;
  --bg-sunken: #F3EEFF;
  --text: #4A4458;
  --text-secondary: #8B82A0;
  --text-muted: #B5AECA;
  --border: #E8E0F4;
  --accent: #9B7FD4;
  --accent-hover: #8A6BC4;
  --accent-light: #F3EEFF;
  --pink: #F2A5B7;
  --mint: #7EC8A8;
  --peach: #F4B183;
  --coral: #E88B8B;
  --badge-blue: #9B7FD4;
  --badge-green: #7EC8A8;
  --badge-yellow: #F4B183;
  --badge-red: #E88B8B;
  --badge-gray: #CAC3D8;
  --shadow: 0 4px 16px rgba(155,127,212,0.1), 0 1px 4px rgba(155,127,212,0.06);
  --shadow-lg: 0 8px 32px rgba(155,127,212,0.14), 0 2px 8px rgba(155,127,212,0.08);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-pill: 999px;
  --font-display: 'Zen Maru Gothic', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1E1B2E;
    --bg-elevated: #2A2640;
    --bg-sunken: #16142A;
    --text: #E8E2F4;
    --text-secondary: #A99FC0;
    --text-muted: #756B90;
    --border: #3D3658;
    --accent: #B9A0E8;
    --accent-hover: #CDBAF0;
    --accent-light: #2A2640;
    --pink: #E8899E;
    --mint: #6DB894;
    --peach: #E0A070;
    --coral: #D47878;
    --badge-blue: #B9A0E8;
    --badge-green: #6DB894;
    --badge-yellow: #E0A070;
    --badge-red: #D47878;
    --badge-gray: #5A5370;
    --shadow: 0 4px 16px rgba(0,0,0,0.25), 0 1px 4px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 0%, rgba(155,127,212,0.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 100%, rgba(242,165,183,0.05) 0%, transparent 50%);
  color: var(--text);
  line-height: 1.6;
  padding: 24px 16px;
  max-width: 800px;
  margin: 0 auto;
}

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  font-size: 1rem;
  color: var(--text-secondary);
  font-family: var(--font-display);
}

.card {
  background: var(--bg-elevated);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 16px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}

.header-info { flex: 1; min-width: 200px; }

.header-info h1 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 2px;
}

.header-meta {
  font-size: 0.8rem;
  color: var(--text-secondary);
  letter-spacing: 0.3px;
}

.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  color: #fff;
  font-weight: 900;
  font-size: 1.15rem;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(155,127,212,0.35);
  font-family: var(--font-body);
}

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  background: rgba(244,177,131,0.18);
  padding: 6px 14px;
  border-radius: var(--radius-pill);
}

.xp-section { margin-top: 14px; }

.xp-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.xp-bar {
  height: 8px;
  background: var(--bg-sunken);
  border-radius: var(--radius-pill);
  overflow: hidden;
}

.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--pink));
  border-radius: var(--radius-pill);
  transition: width 0.6s ease;
}

/* Badge Distribution */
.dist-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 18px;
}

.dist-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
  gap: 12px;
}

.dist-label {
  width: 50px;
  font-size: 0.82rem;
  font-weight: 600;
  flex-shrink: 0;
}

.dist-bar-wrap {
  flex: 1;
  height: 22px;
  background: var(--bg-sunken);
  border-radius: var(--radius-pill);
  overflow: hidden;
  display: flex;
}

.dist-seg {
  height: 100%;
  transition: width 0.5s ease;
  position: relative;
}

.dist-seg.blue { background: var(--badge-blue); }
.dist-seg.green { background: var(--badge-green); }
.dist-seg.yellow { background: var(--badge-yellow); }
.dist-seg.red { background: var(--badge-red); }
.dist-seg.gray { background: var(--badge-gray); }

.dist-count {
  font-size: 0.78rem;
  color: var(--text-secondary);
  width: 30px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.badge-legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 14px;
  font-size: 0.74rem;
  color: var(--text-secondary);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Review Alert */
.review-alert-card {
  background: linear-gradient(135deg, rgba(244,177,131,0.1), rgba(242,165,183,0.08));
}

.review-alert {
  display: flex;
  align-items: center;
  gap: 16px;
}

.review-icon {
  font-size: 2rem;
  flex-shrink: 0;
  background: rgba(244,177,131,0.15);
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.review-content { flex: 1; }

.review-count {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
}

.review-overdue {
  color: var(--badge-red);
  font-weight: 600;
  font-size: 0.82rem;
}

/* Weak Points */
.weak-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 14px;
}

.weak-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--bg-sunken);
}

.weak-item:last-child { border-bottom: none; }

.weak-badge {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.weak-badge.red { background: var(--badge-red); }
.weak-badge.yellow { background: var(--badge-yellow); }

.weak-name {
  font-weight: 600;
  font-size: 0.9rem;
}

.weak-cat {
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

.weak-notes {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 3px;
}

/* Recent Sessions */
.sessions-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 14px;
}

.session-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.2s ease;
}

.session-item:hover {
  background: var(--bg-sunken);
}

.session-date {
  font-size: 0.78rem;
  color: var(--text-muted);
  width: 70px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.session-info { flex: 1; }

.session-mode {
  font-weight: 600;
  font-size: 0.88rem;
}

.session-topics {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.session-score {
  font-size: 0.82rem;
  font-weight: 700;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* Recommendation */
.rec-card {
  background: linear-gradient(135deg, var(--accent-light), var(--bg));
}

.rec-header {
  font-family: var(--font-display);
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 10px;
}

.rec-reason {
  font-size: 0.9rem;
  margin-bottom: 14px;
  line-height: 1.6;
}

.rec-command {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  font-size: 0.82rem;
  font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', monospace;
  box-shadow: 0 4px 12px rgba(155,127,212,0.25);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.rec-command:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

/* Minigame Stats */
.mg-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 14px;
}

.mg-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.mg-item {
  background: var(--bg-sunken);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
  text-align: center;
  transition: transform 0.2s ease;
}

.mg-item:hover { transform: translateY(-2px); }

.mg-item.locked {
  opacity: 0.45;
  cursor: default;
}

.mg-item.locked:hover { transform: none; }

.mg-name {
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 700;
  margin-bottom: 6px;
}

.mg-tier {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 4px;
}

.mg-plays {
  font-size: 0.68rem;
  color: var(--text-muted);
}

.mg-mini-chart {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 3px;
  height: 24px;
  margin-top: 6px;
}

.mg-mini-bar {
  width: 8px;
  border-radius: 2px;
  transition: height 0.3s ease;
}

.mg-lock-icon {
  font-size: 1.2rem;
  margin-bottom: 4px;
  opacity: 0.5;
}

.mg-time-bar {
  margin-top: 10px;
}

.mg-time-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.mg-time-track {
  height: 6px;
  background: var(--bg-sunken);
  border-radius: 3px;
  overflow: hidden;
}

.mg-time-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--mint), var(--accent));
  border-radius: 3px;
  transition: width 0.5s ease;
}

.empty-state {
  text-align: center;
  color: var(--text-secondary);
  padding: 24px;
  font-size: 0.88rem;
  font-family: var(--font-display);
}

@keyframes bounceIn {
  0% { opacity: 0; transform: translateY(20px) scale(0.97); }
  60% { opacity: 1; transform: translateY(-4px) scale(1.005); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

body > .card {
  animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
body > .card:nth-child(2) { animation-delay: 0.06s; }
body > .card:nth-child(3) { animation-delay: 0.12s; }
body > .card:nth-child(4) { animation-delay: 0.18s; }
body > .card:nth-child(5) { animation-delay: 0.24s; }
body > .card:nth-child(6) { animation-delay: 0.30s; }
body > .card:nth-child(7) { animation-delay: 0.36s; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const DATA = null;

;(function() {
  const app = document.getElementById('app');

  if (!DATA) {
    app.innerHTML = '<div class="loading" role="status" aria-label="로딩 중">데이터를 불러오는 중...</div>';
    return;
  }

  const u = DATA.user;
  const s = DATA.summary;
  const rq = DATA.reviewQueue;
  const rs = DATA.recentSessions || [];
  const rec = DATA.recommendation;

  const xpInLevel = u.xp % 100;
  const nextLevelXp = 100;

  const modeLabels = {
    grammar_drill: '문법 드릴',
    vocab_quiz: '어휘 퀴즈',
    kanji_drill: '한자 드릴',
    reading: '독해',
    writing: '작문',
    conversation: '회화',
    translate: '번역',
    grammar: '문법',
    culture: '문화',
    review: '복습',
    daily: '데일리',
    minigame: '미니게임'
  };

  var gameNames = {
    matching_card: '매칭 카드',
    shuffle_puzzle: '셔플 퍼즐',
    snake_match: '스네이크 매치',
    stroke_practice: '따라 쓰기',
    listen_draw: '듣고 그리기',
    radical_assembly: '한자 조립',
    particle_battle: '파티클 배틀',
    keigo_transformer: '경어 변환',
    context_detective: '문맥 추리',
    shiritori: '끝말잇기'
  };

  var allGameKeys = ['matching_card', 'shuffle_puzzle', 'snake_match', 'stroke_practice', 'listen_draw', 'radical_assembly', 'particle_battle', 'keigo_transformer', 'context_detective', 'shiritori'];
  var mg = DATA.minigames || {};

  function modeName(m) { return modeLabels[m] || m; }

  function scoreColor(correct, total) {
    if (total === 0) return 'var(--text-secondary)';
    const r = correct / total;
    if (r >= 0.8) return 'var(--badge-blue)';
    if (r >= 0.6) return 'var(--badge-green)';
    if (r >= 0.4) return 'var(--badge-yellow)';
    return 'var(--badge-red)';
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function buildDistBar(cat) {
    const total = cat.total || 1;
    const segs = ['blue', 'green', 'yellow', 'red'].map(c => {
      const v = cat[c] || 0;
      const pct = (v / total * 100).toFixed(1);
      return v > 0 ? '<div class="dist-seg ' + c + '" style="width:' + pct + '%" title="' + v + '"></div>' : '';
    }).join('');
    return '<div class="dist-bar-wrap">' + segs + '</div>';
  }

  // Header
  let html = '<div class="card header">';
  html += '<div class="level-badge" aria-label="레벨 ' + esc(String(u.playerLevel)) + '">Lv.' + esc(String(u.playerLevel)) + '</div>';
  html += '<div class="header-info">';
  html += '<h1>' + esc(u.level) + ' 일본어 학습</h1>';
  html += '<div class="header-meta">';
  html += esc(u.profile === 'jlpt' ? 'JLPT' : u.profile === 'business' ? '비즈니스' : '교재') + ' | ';
  html += '총 ' + esc(String(u.totalSessions)) + '회 세션 | ';
  html += esc(u.startedAt) + '부터</div>';
  html += '</div>';
  if (u.streak && u.streak.current > 0) {
    html += '<div class="streak-badge" aria-label="연속 ' + u.streak.current + '일">';
    html += '<span style="font-size:1.4rem">&#x1F525;</span> ' + u.streak.current + '일';
    if (u.streak.best) html += ' <span style="font-size:0.72rem;color:var(--text-secondary)">(최고 ' + u.streak.best + '일)</span>';
    html += '</div>';
  }
  html += '</div>';

  // XP Bar
  html += '<div class="card"><div class="xp-section">';
  html += '<div class="xp-label"><span>XP: ' + u.xp + '</span><span>다음 레벨까지 ' + (nextLevelXp - xpInLevel) + ' XP</span></div>';
  html += '<div class="xp-bar"><div class="xp-fill" style="width:' + (xpInLevel / nextLevelXp * 100) + '%"></div></div>';
  html += '</div></div>';

  // Badge Distribution
  html += '<div class="card">';
  html += '<div class="dist-title" id="badge-dist">배지 분포</div>';
  var cats = [
    { label: '어휘', data: s.vocabulary },
    { label: '문법', data: s.grammar },
    { label: '한자', data: s.kanji }
  ];
  cats.forEach(function(c) {
    html += '<div class="dist-row">';
    html += '<div class="dist-label">' + esc(c.label) + '</div>';
    html += buildDistBar(c.data);
    html += '<div class="dist-count">' + c.data.total + '</div>';
    html += '</div>';
  });
  html += '<div class="badge-legend" aria-label="범례">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-blue)"></div>마스터</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-green)"></div>숙련</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-yellow)"></div>학습중</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--badge-red)"></div>보강 필요</div>';
  html += '</div></div>';

  // Review Alert
  if (rq) {
    html += '<div class="card review-alert-card"><div class="review-alert">';
    html += '<div class="review-icon" aria-hidden="true">&#x23F0;</div>';
    html += '<div class="review-content">';
    html += '<div>오늘 복습: <span class="review-count">' + rq.today + '개</span></div>';
    html += '<div style="font-size:0.82rem;color:var(--text-secondary)">이번 주: ' + rq.thisWeek + '개</div>';
    if (rq.overdue > 0) {
      html += '<div class="review-overdue">&#x26A0; 밀린 복습: ' + rq.overdue + '개</div>';
    }
    html += '</div></div></div>';
  }

  // Weak Points
  var weakPoints = [];
  cats.forEach(function(c) {
    if (c.data.weakPoints) {
      c.data.weakPoints.forEach(function(wp) {
        weakPoints.push({ cat: c.label, name: wp.name, badge: wp.badge, notes: wp.errorNotes || [] });
      });
    }
  });

  if (weakPoints.length > 0) {
    html += '<div class="card">';
    html += '<div class="weak-title">약점 항목</div>';
    weakPoints.forEach(function(wp) {
      html += '<div class="weak-item">';
      html += '<div class="weak-badge ' + esc(wp.badge) + '"></div>';
      html += '<div>';
      html += '<div class="weak-name">' + esc(wp.name) + ' <span class="weak-cat">' + esc(wp.cat) + '</span></div>';
      if (wp.notes.length > 0) {
        html += '<div class="weak-notes">' + wp.notes.map(esc).join(', ') + '</div>';
      }
      html += '</div></div>';
    });
    html += '</div>';
  }

  // Minigame Stats
  var mgUnlocked = mg.unlocked || [];
  var mgStats = mg.stats || {};
  if (mgUnlocked.length > 0 || Object.keys(mgStats).length > 0) {
    html += '<div class="card">';
    html += '<div class="mg-title">&#x1F3AE; 미니게임</div>';
    html += '<div class="mg-grid">';
    allGameKeys.forEach(function(key) {
      var isUnlocked = mgUnlocked.indexOf(key) !== -1;
      var stat = mgStats[key];
      if (isUnlocked) {
        html += '<div class="mg-item">';
        html += '<div class="mg-name">' + esc(gameNames[key] || key) + '</div>';
        if (stat) {
          var tierStars = '';
          for (var t = 0; t < (stat.current_tier || 1); t++) tierStars += '\u2605';
          for (var t = (stat.current_tier || 1); t < 4; t++) tierStars += '\u2606';
          html += '<div class="mg-tier">' + tierStars + '</div>';
          html += '<div class="mg-plays">' + (stat.plays || 0) + '회 플레이</div>';
          var scores = stat.recent_scores || [];
          if (scores.length > 0) {
            html += '<div class="mg-mini-chart">';
            scores.forEach(function(sc) {
              var h = Math.max(4, Math.round(sc / 100 * 24));
              var col = sc >= 80 ? 'var(--badge-green)' : sc >= 50 ? 'var(--badge-yellow)' : 'var(--badge-red)';
              html += '<div class="mg-mini-bar" style="height:' + h + 'px;background:' + col + '"></div>';
            });
            html += '</div>';
          }
        } else {
          html += '<div class="mg-tier" style="color:var(--text-muted)">미플레이</div>';
        }
        html += '</div>';
      } else {
        html += '<div class="mg-item locked" title="잠금">';
        html += '<div class="mg-lock-icon">&#x1F512;</div>';
        html += '<div class="mg-name">' + esc(gameNames[key] || key) + '</div>';
        html += '</div>';
      }
    });
    html += '</div>';
    var todayMin = mg.total_game_minutes_today || 0;
    html += '<div class="mg-time-bar">';
    html += '<div class="mg-time-label"><span>오늘 게임 시간</span><span>' + todayMin + ' / 30분</span></div>';
    html += '<div class="mg-time-track"><div class="mg-time-fill" style="width:' + Math.min(100, todayMin / 30 * 100) + '%"></div></div>';
    html += '</div>';
    html += '</div>';
  }

  // Recent Sessions
  if (rs.length > 0) {
    html += '<div class="card">';
    html += '<div class="sessions-title">최근 세션</div>';
    rs.slice(0, 5).forEach(function(ses) {
      html += '<div class="session-item">';
      html += '<div class="session-date">' + esc(ses.date) + '</div>';
      html += '<div class="session-info">';
      html += '<div class="session-mode">' + esc(modeName(ses.mode)) + '</div>';
      if (ses.topics && ses.topics.length) {
        html += '<div class="session-topics">' + ses.topics.map(esc).join(', ') + '</div>';
      }
      html += '</div>';
      if (ses.questions > 0) {
        html += '<div class="session-score" style="color:' + scoreColor(ses.correct, ses.questions) + '">' + ses.correct + '/' + ses.questions + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Recommendation
  if (rec) {
    html += '<div class="card rec-card">';
    html += '<div class="rec-header">&#x1F4A1; 추천</div>';
    html += '<div class="rec-reason">' + esc(rec.reason) + '</div>';
    if (rec.command) {
      html += '<div class="rec-command">' + esc(rec.command) + '</div>';
    }
    html += '</div>';
  }

  app.innerHTML = html;
})();
</script>
</body>
</html>
