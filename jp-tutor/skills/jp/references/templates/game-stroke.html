<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>따라쓰기 연습</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap">
<style>
:root {
  --bg: #FBF7FF;
  --bg-elevated: #FFFFFF;
  --bg-sunken: #F3EEFF;
  --bg-card-back: #FFF8FC;
  --text: #4A4458;
  --text-secondary: #8B82A0;
  --text-muted: #B5AECA;
  --border: #E8E0F4;
  --accent: #9B7FD4;
  --accent-hover: #8A6BC4;
  --accent-light: #F3EEFF;
  --pink: #F2A5B7;
  --mint: #7EC8A8;
  --peach: #F4B183;
  --coral: #E88B8B;
  --badge-green: #7EC8A8;
  --badge-yellow: #F4B183;
  --badge-red: #E88B8B;
  --badge-gray: #CAC3D8;
  --shadow: 0 4px 16px rgba(155,127,212,0.1), 0 1px 4px rgba(155,127,212,0.06);
  --shadow-lg: 0 8px 32px rgba(155,127,212,0.14), 0 2px 8px rgba(155,127,212,0.08);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-pill: 999px;
  --font-display: 'Zen Maru Gothic', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1E1B2E;
    --bg-elevated: #2A2640;
    --bg-sunken: #16142A;
    --bg-card-back: #2E2848;
    --text: #E8E2F4;
    --text-secondary: #A99FC0;
    --text-muted: #756B90;
    --border: #3D3658;
    --accent: #B9A0E8;
    --accent-hover: #CDBAF0;
    --accent-light: #2A2640;
    --pink: #E8899E;
    --mint: #6DB894;
    --peach: #E0A070;
    --coral: #D47878;
    --badge-green: #6DB894;
    --badge-yellow: #E0A070;
    --badge-red: #D47878;
    --badge-gray: #5A5370;
    --shadow: 0 4px 16px rgba(0,0,0,0.25), 0 1px 4px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(155,127,212,0.06) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 80%, rgba(242,165,183,0.05) 0%, transparent 50%);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  user-select: none;
  -webkit-user-select: none;
}

.container {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.header {
  width: 100%;
  text-align: center;
}

.header h1 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.header .round-info {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.progress-wrap {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress-counter {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

.progress-bar {
  flex: 1;
  height: 8px;
  background: var(--bg-sunken);
  border-radius: var(--radius-pill);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--pink));
  border-radius: var(--radius-pill);
  transition: width 0.4s ease;
}

.char-info {
  text-align: center;
  font-family: var(--font-display);
}

.char-reading {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.char-display {
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1.2;
}

.guide-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.canvas-wrap {
  position: relative;
  width: 300px;
  height: 300px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elevated);
  box-shadow: var(--shadow);
  overflow: hidden;
  touch-action: none;
  cursor: crosshair;
  transition: border-color 0.3s ease;
}

.canvas-wrap canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 300px;
  height: 300px;
}

#guideCanvas { z-index: 1; pointer-events: none; }
#drawCanvas { z-index: 2; }
#animCanvas { z-index: 3; pointer-events: none; }

.btn-row {
  display: flex;
  gap: 10px;
  width: 100%;
  justify-content: center;
}

.btn {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  padding: 12px 28px;
  border: none;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}

.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--pink));
  color: #fff;
  box-shadow: var(--shadow);
}

.btn-accent:hover:not(:disabled) {
  box-shadow: var(--shadow-lg);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg-sunken);
  color: var(--text-secondary);
}

.btn-secondary:hover:not(:disabled) {
  background: var(--border);
}

.final-screen {
  width: 100%;
  text-align: center;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 20px;
}

.final-screen.show {
  display: flex;
}

.final-title {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--accent);
}

.final-stats {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--text-secondary);
  line-height: 1.8;
}

.game-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.game-area.hidden { display: none; }

.loading {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--text-muted);
  padding: 40px 0;
}

/* === Ambient Particles & Sound Toggle === */
.v2-ambient-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.v2-ambient-particle {
  position: absolute;
  border-radius: 999px;
  opacity: 0.5;
  filter: blur(0.2px);
  animation: v2drift linear infinite;
}
.v2-ambient-particle::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.9), rgba(255,255,255,0.15));
}
@keyframes v2drift {
  0% { transform: translate3d(0, 0, 0) scale(1); }
  50% { transform: translate3d(16px, -22px, 0) scale(1.06); }
  100% { transform: translate3d(-8px, -48px, 0) scale(0.98); }
}
.v2-sound-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 9999;
  appearance: none;
  border: 1px solid var(--border, #E8E0F4);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 0.78rem;
  font-weight: 700;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: rgba(255,255,255,0.7);
  color: var(--text, #4A4458);
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: transform 180ms ease, box-shadow 180ms ease;
}
.v2-sound-toggle:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.1);
}
.v2-sound-toggle:active {
  transform: translateY(0) scale(0.97);
}
@media (prefers-color-scheme: dark) {
  .v2-sound-toggle {
    background: rgba(46, 38, 62, 0.7);
    border-color: rgba(255,255,255,0.12);
    color: #f4ecff;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>따라쓰기 연습</h1>
    <div class="round-info" id="roundInfo"></div>
  </div>

  <div class="progress-wrap">
    <span class="progress-counter" id="progressCounter">0/0</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="game-area" id="gameArea">
    <div class="char-info">
      <div class="char-display" id="charDisplay"></div>
      <div class="char-reading" id="charReading"></div>
      <div class="guide-label" id="guideLabel"></div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="guideCanvas" width="300" height="300"></canvas>
      <canvas id="drawCanvas" width="300" height="300"></canvas>
      <canvas id="animCanvas" width="300" height="300"></canvas>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="btnReset">다시 쓰기</button>
      <button class="btn btn-secondary" id="btnShowAnswer">정답 보기</button>
      <button class="btn btn-accent" id="btnNext">다음</button>
    </div>
  </div>

  <div class="final-screen" id="finalScreen">
    <div class="final-title">연습 완료!</div>
    <div class="final-stats" id="finalStats"></div>
    <button class="btn btn-accent" id="btnRetry">다시 하기</button>
  </div>

  <div class="loading" id="loading">데이터를 불러오는 중...</div>
</div>

<script>
const DATA = null;

;(function() {
  'use strict';

  if (!DATA) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('gameArea').classList.add('hidden');
    return;
  }

  document.getElementById('loading').style.display = 'none';

  var characters = DATA.characters || [];
  var showPreviewTime = DATA.showPreviewTime != null ? DATA.showPreviewTime : 2;
  var roundNumber = DATA.roundNumber || 1;
  var totalRounds = DATA.totalRounds || 1;

  var currentIndex = 0;
  var isDrawing = false;
  var userStrokes = [];
  var currentStroke = [];
  var previewTimer = null;

  var drawCanvas = document.getElementById('drawCanvas');
  var drawCtx = drawCanvas.getContext('2d');
  var guideCanvas = document.getElementById('guideCanvas');
  var guideCtx = guideCanvas.getContext('2d');
  var animCanvas = document.getElementById('animCanvas');
  var animCtx = animCanvas.getContext('2d');
  var canvasWrap = document.getElementById('canvasWrap');

  var btnReset = document.getElementById('btnReset');
  var btnNext = document.getElementById('btnNext');

  if (totalRounds > 1) {
    document.getElementById('roundInfo').textContent = 'Round ' + roundNumber + ' / ' + totalRounds;
  }

  function updateProgress() {
    var total = characters.length;
    document.getElementById('progressCounter').textContent = currentIndex + '/' + total;
    document.getElementById('progressFill').style.width = (total > 0 ? (currentIndex / total * 100) : 0) + '%';
  }

  function drawStrokesOnCtx(ctx, strokes, opts) {
    opts = opts || {};
    var color = opts.color || 'rgba(0,0,0,0.8)';
    var lineWidth = opts.lineWidth || 6;
    var dash = opts.dash || [];

    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash(dash);

    for (var s = 0; s < strokes.length; s++) {
      var pts = strokes[s];
      if (pts.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (var p = 1; p < pts.length; p++) {
        if (p < pts.length - 1) {
          var mx = (pts[p][0] + pts[p+1][0]) / 2;
          var my = (pts[p][1] + pts[p+1][1]) / 2;
          ctx.quadraticCurveTo(pts[p][0], pts[p][1], mx, my);
        } else {
          ctx.lineTo(pts[p][0], pts[p][1]);
        }
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawGrid() {
    guideCtx.strokeStyle = 'rgba(200,190,220,0.2)';
    guideCtx.lineWidth = 1;
    guideCtx.setLineDash([4, 4]);
    guideCtx.beginPath();
    guideCtx.moveTo(150, 0); guideCtx.lineTo(150, 300);
    guideCtx.moveTo(0, 150); guideCtx.lineTo(300, 150);
    guideCtx.stroke();
    guideCtx.setLineDash([]);
  }

  function drawGuide(charData) {
    guideCtx.clearRect(0, 0, 300, 300);
    drawGrid();

    // 실제 글자를 크게 흐리게 표시
    guideCtx.fillStyle = 'rgba(155,127,212,0.18)';
    guideCtx.font = '240px serif';
    guideCtx.textAlign = 'center';
    guideCtx.textBaseline = 'middle';
    guideCtx.fillText(charData.char, 150, 158);
  }

  function loadCharacter() {
    if (currentIndex >= characters.length) {
      showFinal();
      return;
    }

    userStrokes = [];
    currentStroke = [];

    drawCtx.clearRect(0, 0, 300, 300);
    animCtx.clearRect(0, 0, 300, 300);
    btnReset.disabled = false;

    var charData = characters[currentIndex];

    document.getElementById('charDisplay').textContent = charData.char;
    document.getElementById('charReading').textContent = charData.reading;
    document.getElementById('guideLabel').textContent = '따라 쓰세요';

    updateProgress();

    drawGuide(charData);
    guideCanvas.style.opacity = '1';
    guideCanvas.style.transition = '';
    if (previewTimer) clearTimeout(previewTimer);

    // 글자를 잠시 보여준 후 서서히 사라지게
    var fadeDelay = (showPreviewTime > 0) ? showPreviewTime * 1000 : 2000;
    previewTimer = setTimeout(function() {
      guideCanvas.style.transition = 'opacity 1.5s ease';
      guideCanvas.style.opacity = '0';
      setTimeout(function() {
        guideCtx.clearRect(0, 0, 300, 300);
        guideCanvas.style.opacity = '1';
        guideCanvas.style.transition = '';
        drawGrid();
      }, 1500);
    }, fadeDelay);
  }


  // Pointer events
  function getPos(e) {
    var rect = drawCanvas.getBoundingClientRect();
    var scaleX = 300 / rect.width;
    var scaleY = 300 / rect.height;
    return [
      (e.clientX - rect.left) * scaleX,
      (e.clientY - rect.top) * scaleY
    ];
  }

  function onPointerDown(e) {
    e.preventDefault();
    isDrawing = true;
    currentStroke = [getPos(e)];
    drawCtx.beginPath();
    drawCtx.moveTo(currentStroke[0][0], currentStroke[0][1]);
  }

  function onPointerMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    var pos = getPos(e);
    currentStroke.push(pos);

    // Draw smooth line
    drawCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    drawCtx.lineWidth = 6;
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';

    if (currentStroke.length >= 3) {
      var l = currentStroke.length;
      var p0 = currentStroke[l - 3];
      var p1 = currentStroke[l - 2];
      var p2 = currentStroke[l - 1];
      var mx = (p1[0] + p2[0]) / 2;
      var my = (p1[1] + p2[1]) / 2;
      drawCtx.beginPath();
      drawCtx.moveTo((p0[0] + p1[0]) / 2, (p0[1] + p1[1]) / 2);
      drawCtx.quadraticCurveTo(p1[0], p1[1], mx, my);
      drawCtx.stroke();
    } else if (currentStroke.length === 2) {
      drawCtx.beginPath();
      drawCtx.moveTo(currentStroke[0][0], currentStroke[0][1]);
      drawCtx.lineTo(pos[0], pos[1]);
      drawCtx.stroke();
    }
  }

  function onPointerUp(e) {
    if (!isDrawing) return;
    isDrawing = false;
    if (currentStroke.length > 1) {
      userStrokes.push(currentStroke.slice());
    }
    currentStroke = [];
  }

  drawCanvas.addEventListener('pointerdown', onPointerDown);
  drawCanvas.addEventListener('pointermove', onPointerMove);
  drawCanvas.addEventListener('pointerup', onPointerUp);
  drawCanvas.addEventListener('pointerleave', onPointerUp);
  drawCanvas.addEventListener('pointercancel', onPointerUp);

  // Reset button
  btnReset.addEventListener('click', function() {
    drawCtx.clearRect(0, 0, 300, 300);
    animCtx.clearRect(0, 0, 300, 300);
    userStrokes = [];
    currentStroke = [];
  });

  // Show answer button — 흐린 글자 다시 보여주기
  document.getElementById('btnShowAnswer').addEventListener('click', function() {
    var charData = characters[currentIndex];
    if (charData) {
      drawGuide(charData);
    }
  });

  // Next button — simply advance to next character
  btnNext.addEventListener('click', function() {
    currentIndex++;
    loadCharacter();
  });

  function animateAnswer(strokes) {
    animCtx.clearRect(0, 0, 300, 300);
    var totalPoints = 0;
    for (var s = 0; s < strokes.length; s++) totalPoints += strokes[s].length;
    if (totalPoints === 0) return;

    var frameDuration = 1000 / totalPoints; // 1s total
    var strokeIdx = 0;
    var pointIdx = 0;

    animCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--coral').trim();
    animCtx.lineWidth = 5;
    animCtx.lineCap = 'round';
    animCtx.lineJoin = 'round';

    function drawNext() {
      if (strokeIdx >= strokes.length) return;

      var pts = strokes[strokeIdx];
      if (pointIdx === 0) {
        animCtx.beginPath();
        animCtx.moveTo(pts[0][0], pts[0][1]);
        pointIdx = 1;
      }

      if (pointIdx < pts.length) {
        var prev = pts[pointIdx - 1];
        var curr = pts[pointIdx];
        if (pointIdx < pts.length - 1) {
          var next = pts[pointIdx + 1];
          var mx = (curr[0] + next[0]) / 2;
          var my = (curr[1] + next[1]) / 2;
          animCtx.quadraticCurveTo(curr[0], curr[1], mx, my);
        } else {
          animCtx.lineTo(curr[0], curr[1]);
        }
        animCtx.stroke();
        // Re-begin path from last drawn point for continuous stroke
        animCtx.beginPath();
        if (pointIdx < pts.length - 1) {
          var nx = pts[pointIdx + 1];
          var mx2 = (curr[0] + (nx ? nx[0] : curr[0])) / 2;
          var my2 = (curr[1] + (nx ? nx[1] : curr[1])) / 2;
          animCtx.moveTo(mx2, my2);
        }
        pointIdx++;
        setTimeout(drawNext, frameDuration);
      } else {
        // Next stroke
        strokeIdx++;
        pointIdx = 0;
        setTimeout(drawNext, frameDuration * 2); // Small pause between strokes
      }
    }

    drawNext();
  }

  function showFinal() {
    document.getElementById('gameArea').classList.add('hidden');
    var finalScreen = document.getElementById('finalScreen');
    finalScreen.classList.add('show');

    var total = characters.length;
    document.getElementById('finalStats').innerHTML =
      '총 <strong>' + total + '</strong>자 연습 완료';

    document.getElementById('progressCounter').textContent = total + '/' + total;
    document.getElementById('progressFill').style.width = '100%';
  }

  document.getElementById('btnRetry').addEventListener('click', function() {
    currentIndex = 0;
    document.getElementById('finalScreen').classList.remove('show');
    document.getElementById('gameArea').classList.remove('hidden');
    loadCharacter();
  });

  // Start
  loadCharacter();
})();
</script>
<script>
;(function() {
  if (window.__V2_FX__) return;
  window.__V2_FX__ = true;

  /* --- Ambient Particles --- */
  var ambientLayer = document.createElement('div');
  ambientLayer.className = 'v2-ambient-layer';
  ambientLayer.setAttribute('aria-hidden', 'true');
  document.body.insertBefore(ambientLayer, document.body.firstChild);

  function createParticles() {
    var count = window.innerWidth < 600 ? 16 : 26;
    ambientLayer.innerHTML = '';
    var colors = [
      'rgba(155,127,212,0.24)',
      'rgba(242,165,183,0.22)',
      'rgba(126,200,168,0.2)',
      'rgba(244,177,131,0.18)'
    ];
    for (var i = 0; i < count; i++) {
      var p = document.createElement('span');
      var size = 10 + Math.random() * 22;
      p.className = 'v2-ambient-particle';
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.background = colors[i % colors.length];
      p.style.animationDuration = (7 + Math.random() * 9) + 's';
      p.style.animationDelay = (-Math.random() * 8) + 's';
      ambientLayer.appendChild(p);
    }
  }
  createParticles();
  window.addEventListener('resize', createParticles);

  /* --- Web Audio Sound Effects --- */
  var AudioCtor = window.AudioContext || window.webkitAudioContext;
  var audioCtx = null;
  var muted = false;

  function ensureAudio() {
    if (!AudioCtor || muted) return null;
    if (!audioCtx) audioCtx = new AudioCtor();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(opts) {
    var ctx = ensureAudio();
    if (!ctx) return;
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(opts.from, now);
    if (opts.to) osc.frequency.exponentialRampToValueAtTime(opts.to, now + opts.dur);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(opts.vol || 0.04, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + opts.dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + opts.dur + 0.02);
  }

  window.__v2sfx = {
    click: function() { playTone({from:560,to:620,dur:0.08,vol:0.025,type:'triangle'}); },
    success: function() {
      playTone({from:520,to:780,dur:0.12,vol:0.04,type:'sine'});
      setTimeout(function(){ playTone({from:780,to:1040,dur:0.18,vol:0.04,type:'sine'}); }, 90);
    },
    error: function() { playTone({from:230,to:140,dur:0.16,vol:0.05,type:'sawtooth'}); }
  };

  /* --- Sound Toggle Button --- */
  var btn = document.createElement('button');
  btn.className = 'v2-sound-toggle';
  btn.type = 'button';
  btn.setAttribute('aria-label', '소리 켜기/끄기');
  btn.innerHTML = '<span>🔊</span><span>소리 켜짐</span>';
  btn.addEventListener('click', function() {
    muted = !muted;
    btn.innerHTML = muted
      ? '<span>🔇</span><span>소리 꺼짐</span>'
      : '<span>🔊</span><span>소리 켜짐</span>';
    window.__v2sfx.click();
  });
  document.body.appendChild(btn);

  /* --- Auto-hook clicks for sound --- */
  document.addEventListener('pointerdown', function() {
    if (!muted) window.__v2sfx.click();
  }, {passive: true});

  /* --- Auto-detect success/error via class changes --- */
  var observer = new MutationObserver(function(muts) {
    muts.forEach(function(m) {
      if (!m.target || !m.target.classList) return;
      var cl = m.target.className || '';
      if (/\b(correct|matched|pass|clear|success)\b/i.test(cl)) {
        if (!muted) window.__v2sfx.success();
      } else if (/\b(wrong|error|fail|miss|mismatch|danger)\b/i.test(cl)) {
        if (!muted) window.__v2sfx.error();
      }
    });
  });
  observer.observe(document.body, {attributes:true, subtree:true, attributeFilter:['class']});
})();
</script>
</body>
</html>
