<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플래시카드</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap">
<style>
:root {
  --bg: #FBF7FF;
  --bg-elevated: #FFFFFF;
  --bg-sunken: #F3EEFF;
  --bg-card-back: #FFF8FC;
  --text: #4A4458;
  --text-secondary: #8B82A0;
  --text-muted: #B5AECA;
  --border: #E8E0F4;
  --accent: #9B7FD4;
  --accent-hover: #8A6BC4;
  --accent-light: #F3EEFF;
  --pink: #F2A5B7;
  --mint: #7EC8A8;
  --peach: #F4B183;
  --coral: #E88B8B;
  --badge-green: #7EC8A8;
  --badge-yellow: #F4B183;
  --badge-red: #E88B8B;
  --badge-gray: #CAC3D8;
  --shadow: 0 4px 16px rgba(155,127,212,0.1), 0 1px 4px rgba(155,127,212,0.06);
  --shadow-lg: 0 8px 32px rgba(155,127,212,0.14), 0 2px 8px rgba(155,127,212,0.08);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-pill: 999px;
  --font-display: 'Zen Maru Gothic', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1E1B2E;
    --bg-elevated: #2A2640;
    --bg-sunken: #16142A;
    --bg-card-back: #2E2848;
    --text: #E8E2F4;
    --text-secondary: #A99FC0;
    --text-muted: #756B90;
    --border: #3D3658;
    --accent: #B9A0E8;
    --accent-hover: #CDBAF0;
    --accent-light: #2A2640;
    --pink: #E8899E;
    --mint: #6DB894;
    --peach: #E0A070;
    --coral: #D47878;
    --badge-green: #6DB894;
    --badge-yellow: #E0A070;
    --badge-red: #D47878;
    --badge-gray: #5A5370;
    --shadow: 0 4px 16px rgba(0,0,0,0.25), 0 1px 4px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(155,127,212,0.06) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 80%, rgba(242,165,183,0.05) 0%, transparent 50%);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  user-select: none;
  -webkit-user-select: none;
}

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  font-size: 1rem;
  color: var(--text-secondary);
  font-family: var(--font-display);
}

/* Top bar */
.topbar {
  width: 100%;
  max-width: 500px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.topbar-info {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.topbar-info strong {
  color: var(--text);
  font-family: var(--font-display);
  font-weight: 700;
}

.btn-shuffle {
  background: var(--bg-sunken);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 6px 16px;
  font-size: 0.78rem;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 600;
  font-family: var(--font-body);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  letter-spacing: 0.3px;
}
.btn-shuffle:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

/* TTS Controls */
.tts-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  max-width: 500px;
  margin-bottom: 12px;
  font-size: 0.78rem;
  color: var(--text-secondary);
}

.tts-label {
  font-weight: 600;
  font-family: var(--font-display);
}

.tts-bar select {
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  color: var(--text);
  font-size: 0.78rem;
  font-family: var(--font-body);
  outline: none;
  max-width: 160px;
  transition: border-color 0.2s;
}

.tts-bar select:focus { border-color: var(--accent); }

.tts-bar input[type="range"] {
  width: 80px;
  -webkit-appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

.tts-bar input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(155,127,212,0.3);
}

.tts-bar .speed-val {
  font-weight: 600;
  min-width: 28px;
  font-variant-numeric: tabular-nums;
}

/* Progress bar */
.progress-wrap {
  width: 100%;
  max-width: 500px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin-bottom: 22px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--pink));
  border-radius: 3px;
  transition: width 0.3s ease;
}

/* Card area */
.card-area {
  width: 100%;
  max-width: 500px;
  perspective: 1000px;
  margin-bottom: 22px;
}

.card-container {
  width: 100%;
  min-height: 340px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.34, 1.3, 0.64, 1);
  cursor: pointer;
}

.card-container.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  width: 100%;
  min-height: 340px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  border: 1.5px solid var(--border);
}

.card-front {
  background: var(--bg-elevated);
  align-items: center;
  justify-content: center;
  padding: 44px 28px;
  position: relative;
}

/* Decorative flower corners */
.card-front::before {
  content: '\273F';
  position: absolute;
  top: 14px;
  left: 18px;
  font-size: 0.8rem;
  color: var(--pink);
  opacity: 0.4;
}

.card-front::after {
  content: '\273F';
  position: absolute;
  bottom: 14px;
  right: 18px;
  font-size: 0.8rem;
  color: var(--accent);
  opacity: 0.35;
}

.card-back {
  background: var(--bg-card-back);
  transform: rotateY(180deg);
  padding: 28px;
  overflow-y: auto;
}

.front-text {
  font-family: var(--font-display);
  font-size: 3.2rem;
  font-weight: 900;
  text-align: center;
  line-height: 1.3;
}

.front-hint {
  margin-top: 18px;
  font-size: 0.78rem;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  font-weight: 500;
  font-family: var(--font-display);
}

.btn-speak {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  color: #fff;
  font-size: 1.15rem;
  cursor: pointer;
  margin-top: 14px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 3px 10px rgba(155,127,212,0.25);
}

.btn-speak:hover { transform: scale(1.15); box-shadow: 0 5px 16px rgba(155,127,212,0.35); }
.btn-speak.speaking { animation: speakPulse 1.5s ease-in-out infinite; box-shadow: 0 0 0 6px rgba(242,165,183,0.2), 0 3px 10px rgba(155,127,212,0.25); }

@keyframes speakPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 6px rgba(242,165,183,0.2), 0 3px 10px rgba(155,127,212,0.25); }
  50% { transform: scale(1.08); box-shadow: 0 0 0 10px rgba(242,165,183,0.1), 0 5px 16px rgba(155,127,212,0.35); }
}

/* Back content */
.back-section { margin-bottom: 16px; }
.back-section:last-child { margin-bottom: 0; }

.back-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  font-family: var(--font-display);
}

.back-value { font-size: 0.95rem; }

.back-value.large {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
}

.back-list { list-style: none; padding: 0; }

.back-list li {
  font-size: 0.85rem;
  padding: 5px 0;
  border-bottom: 1px dashed var(--border);
}

.back-list li:last-child { border-bottom: none; }

/* Assessment */
.assess-row {
  display: flex;
  gap: 8px;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px dashed var(--border);
}

.btn-assess {
  flex: 1;
  border: none;
  border-radius: var(--radius-pill);
  padding: 11px 0;
  font-size: 0.82rem;
  font-weight: 700;
  font-family: var(--font-body);
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: #fff;
  letter-spacing: 0.3px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.btn-assess:hover { transform: translateY(-2px); }
.btn-assess:active { transform: scale(0.95); }
.btn-assess.green { background: var(--badge-green); }
.btn-assess.yellow { background: var(--badge-yellow); }
.btn-assess.red { background: var(--badge-red); }

/* Navigation */
.nav-row {
  display: flex;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 500px;
}

.btn-nav {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 12px;
  font-size: 0.85rem;
  font-weight: 600;
  background: var(--bg-elevated);
  color: var(--text);
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.btn-nav:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
.btn-nav:disabled { opacity: 0.25; cursor: default; }
.btn-nav:disabled:hover { border-color: var(--border); color: var(--text); transform: none; }

.counter {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 700;
  min-width: 60px;
  text-align: center;
  color: var(--text-secondary);
}

/* Results */
.results {
  width: 100%;
  max-width: 500px;
  background: var(--bg-elevated);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 36px 28px;
  text-align: center;
  border: 1.5px solid var(--border);
}

.results h2 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 900;
  margin-bottom: 24px;
  color: var(--text);
}

.results-bars { margin-bottom: 28px; }

.result-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.result-label {
  width: 80px;
  text-align: right;
  font-size: 0.82rem;
  font-weight: 700;
  font-family: var(--font-display);
}

.result-bar {
  flex: 1;
  height: 22px;
  background: var(--bg-sunken);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.result-fill {
  height: 100%;
  border-radius: var(--radius-sm);
  transition: width 0.5s ease;
}

.result-count {
  width: 30px;
  font-size: 0.82rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.btn-restart {
  background: linear-gradient(135deg, var(--accent), var(--pink));
  color: #fff;
  border: none;
  border-radius: var(--radius-pill);
  padding: 13px 32px;
  font-size: 0.9rem;
  font-weight: 700;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 14px rgba(155,127,212,0.25);
}

.btn-restart:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 20px rgba(155,127,212,0.3); }

@keyframes bounceIn {
  0% { opacity: 0; transform: translateY(20px) scale(0.97); }
  60% { opacity: 1; transform: translateY(-4px) scale(1.01); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

body > * { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

@media (max-width: 520px) {
  .front-text { font-size: 2.4rem; }
  .card-face { min-height: 300px; }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
const DATA = null;

;(function() {
  const app = document.getElementById('app');

  if (!DATA) {
    app.innerHTML = '<div class="loading" role="status" aria-label="로딩 중">데이터를 불러오는 중...</div>';
    return;
  }

  var cards = DATA.cards.slice();
  var idx = 0;
  var flipped = false;
  var results = [];
  var finished = false;
  var touchStartX = 0;
  var touchStartY = 0;

  // TTS
  var hasTTS = 'speechSynthesis' in window;
  var jaVoices = [];
  var selectedVoiceIdx = 0;
  var ttsRate = DATA.ttsRate || 0.8;
  var isSpeaking = false;

  function sortVoices(voices) {
    var preferred = ['kyoko', 'otoya', 'o-ren', 'hattori'];
    voices.sort(function(a, b) {
      var aLocal = a.localService ? 0 : 1;
      var bLocal = b.localService ? 0 : 1;
      if (aLocal !== bLocal) return aLocal - bLocal;
      var aName = a.name.toLowerCase();
      var bName = b.name.toLowerCase();
      var aIdx = -1, bIdx = -1;
      for (var i = 0; i < preferred.length; i++) {
        if (aName.indexOf(preferred[i]) !== -1) { aIdx = i; break; }
      }
      for (var i = 0; i < preferred.length; i++) {
        if (bName.indexOf(preferred[i]) !== -1) { bIdx = i; break; }
      }
      if (aIdx !== -1 && bIdx === -1) return -1;
      if (aIdx === -1 && bIdx !== -1) return 1;
      if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
      return aName.localeCompare(bName);
    });
    return voices;
  }

  function loadVoices() {
    if (!hasTTS) return;
    var all = speechSynthesis.getVoices();
    jaVoices = all.filter(function(v) { return v.lang && v.lang.startsWith('ja'); });
    if (jaVoices.length === 0) {
      jaVoices = all.filter(function(v) { return v.lang && v.lang.indexOf('ja') !== -1; });
    }
    jaVoices = sortVoices(jaVoices);
    render();
  }

  function speakText(text) {
    if (!hasTTS || !text) return;
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = ttsRate;
    if (jaVoices.length > 0) u.voice = jaVoices[selectedVoiceIdx];
    isSpeaking = true;
    var btn = document.getElementById('btn-speak');
    if (btn) btn.classList.add('speaking');
    u.onend = function() {
      isSpeaking = false;
      var b = document.getElementById('btn-speak');
      if (b) b.classList.remove('speaking');
    };
    u.onerror = u.onend;
    speechSynthesis.speak(u);
  }

  if (hasTTS) {
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.addEventListener('voiceschanged', loadVoices);
    }
    loadVoices();
  }

  for (var i = 0; i < cards.length; i++) results.push(null);

  function esc(str) {
    if (str == null) return '';
    var d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function shuffle() {
    for (var i = cards.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = cards[i]; cards[i] = cards[j]; cards[j] = t;
      var r = results[i]; results[i] = results[j]; results[j] = r;
    }
    idx = 0;
    flipped = false;
    finished = false;
    render();
  }

  function buildBack(card) {
    var b = card.back;
    var mode = DATA.mode;
    var html = '';

    if (mode === 'kanji') {
      if (b.onyomi) html += '<div class="back-section"><div class="back-label">음독 (ON)</div><div class="back-value large">' + esc(b.onyomi) + '</div></div>';
      if (b.kunyomi) html += '<div class="back-section"><div class="back-label">훈독 (KUN)</div><div class="back-value large">' + esc(b.kunyomi) + '</div></div>';
      if (b.meaning) html += '<div class="back-section"><div class="back-label">의미</div><div class="back-value">' + esc(b.meaning) + '</div></div>';
      if (b.words && b.words.length) {
        html += '<div class="back-section"><div class="back-label">관련 단어</div><ul class="back-list">';
        b.words.forEach(function(w) { html += '<li>' + esc(w) + '</li>'; });
        html += '</ul></div>';
      }
      if (b.similar && b.similar.length) {
        html += '<div class="back-section"><div class="back-label">유사 한자</div><ul class="back-list">';
        b.similar.forEach(function(w) { html += '<li>' + esc(w) + '</li>'; });
        html += '</ul></div>';
      }
    } else if (mode === 'vocabulary') {
      if (b.reading) html += '<div class="back-section"><div class="back-label">읽기</div><div class="back-value large">' + esc(b.reading) + '</div></div>';
      if (b.meaning) html += '<div class="back-section"><div class="back-label">의미</div><div class="back-value">' + esc(b.meaning) + '</div></div>';
      if (b.example) html += '<div class="back-section"><div class="back-label">예문</div><div class="back-value">' + esc(b.example) + '</div></div>';
      if (b.similar && b.similar.length) {
        html += '<div class="back-section"><div class="back-label">유사 단어</div><ul class="back-list">';
        b.similar.forEach(function(w) { html += '<li>' + esc(w) + '</li>'; });
        html += '</ul></div>';
      }
    } else if (mode === 'grammar') {
      if (b.pattern) html += '<div class="back-section"><div class="back-label">패턴</div><div class="back-value large">' + esc(b.pattern) + '</div></div>';
      if (b.meaning) html += '<div class="back-section"><div class="back-label">의미</div><div class="back-value">' + esc(b.meaning) + '</div></div>';
      if (b.examples && b.examples.length) {
        html += '<div class="back-section"><div class="back-label">예문</div><ul class="back-list">';
        b.examples.forEach(function(w) { html += '<li>' + esc(w) + '</li>'; });
        html += '</ul></div>';
      }
      if (b.comparison && b.comparison.length) {
        html += '<div class="back-section"><div class="back-label">비교</div><ul class="back-list">';
        b.comparison.forEach(function(w) { html += '<li>' + esc(w) + '</li>'; });
        html += '</ul></div>';
      }
    } else if (mode === 'culture') {
      if (b.literal) html += '<div class="back-section"><div class="back-label">직역</div><div class="back-value">' + esc(b.literal) + '</div></div>';
      if (b.meaning) html += '<div class="back-section"><div class="back-label">의미</div><div class="back-value">' + esc(b.meaning) + '</div></div>';
      if (b.usage) html += '<div class="back-section"><div class="back-label">사용법</div><div class="back-value">' + esc(b.usage) + '</div></div>';
      if (b.koreanEquivalent) html += '<div class="back-section"><div class="back-label">한국어 대응</div><div class="back-value">' + esc(b.koreanEquivalent) + '</div></div>';
    } else {
      Object.keys(b).forEach(function(k) {
        var v = b[k];
        if (Array.isArray(v)) {
          html += '<div class="back-section"><div class="back-label">' + esc(k) + '</div><ul class="back-list">';
          v.forEach(function(item) { html += '<li>' + esc(item) + '</li>'; });
          html += '</ul></div>';
        } else {
          html += '<div class="back-section"><div class="back-label">' + esc(k) + '</div><div class="back-value">' + esc(v) + '</div></div>';
        }
      });
    }

    return html;
  }

  function renderResults() {
    var counts = { green: 0, yellow: 0, red: 0, none: 0 };
    results.forEach(function(r) {
      if (r === 'green') counts.green++;
      else if (r === 'yellow') counts.yellow++;
      else if (r === 'red') counts.red++;
      else counts.none++;
    });
    var total = cards.length || 1;

    var html = '<div class="results" role="region" aria-label="결과 요약">';
    html += '<h2>학습 완료!</h2>';
    html += '<div class="results-bars">';

    var rows = [
      { label: '알겠어요', count: counts.green, color: 'var(--badge-green)' },
      { label: '애매해요', count: counts.yellow, color: 'var(--badge-yellow)' },
      { label: '모르겠어요', count: counts.red, color: 'var(--badge-red)' }
    ];
    if (counts.none > 0) rows.push({ label: '미평가', count: counts.none, color: 'var(--badge-gray)' });

    rows.forEach(function(r) {
      html += '<div class="result-row">';
      html += '<div class="result-label">' + r.label + '</div>';
      html += '<div class="result-bar"><div class="result-fill" style="width:' + (r.count / total * 100) + '%;background:' + r.color + '"></div></div>';
      html += '<div class="result-count">' + r.count + '</div>';
      html += '</div>';
    });

    html += '</div>';
    html += '<button class="btn-restart" onclick="location.reload()" aria-label="다시 시작">다시 시작</button>';
    html += '</div>';

    app.innerHTML = html;
  }

  function render() {
    if (finished) { renderResults(); return; }

    var card = cards[idx];
    var total = cards.length;
    var pct = ((idx + 1) / total * 100).toFixed(1);

    var modeLabels = { kanji: '한자', vocabulary: '어휘', grammar: '문법', culture: '문화' };
    var modeLabel = modeLabels[DATA.mode] || DATA.mode;

    var html = '';

    html += '<div class="topbar">';
    html += '<div class="topbar-info"><strong>' + esc(DATA.level) + '</strong> ' + esc(modeLabel) + '</div>';
    html += '<button class="btn-shuffle" aria-label="순서 섞기">&#x1F500; 섞기</button>';
    html += '</div>';

    if (hasTTS) {
      html += '<div class="tts-bar">';
      html += '<span class="tts-label">Voice</span>';
      html += '<select id="voice-sel">';
      if (jaVoices.length > 0) {
        jaVoices.forEach(function(v, i) {
          var label = v.name.replace('Google ', '').replace('Microsoft ', 'MS ');
          if (v.localService) label = '\u2605 ' + label;
          html += '<option value="' + i + '"' + (i === selectedVoiceIdx ? ' selected' : '') + '>' + esc(label) + '</option>';
        });
      } else {
        html += '<option value="">loading...</option>';
      }
      html += '</select>';
      html += '<span style="margin-left:auto">Speed</span>';
      html += '<input type="range" id="tts-speed" min="0.3" max="2.0" step="0.1" value="' + ttsRate + '">';
      html += '<span class="speed-val" id="tts-speed-val">' + ttsRate.toFixed(1) + 'x</span>';
      html += '</div>';
    }

    html += '<div class="progress-wrap" role="progressbar" aria-valuenow="' + (idx + 1) + '" aria-valuemin="1" aria-valuemax="' + total + '">';
    html += '<div class="progress-fill" style="width:' + pct + '%"></div></div>';

    html += '<div class="card-area">';
    html += '<div class="card-container' + (flipped ? ' flipped' : '') + '" role="button" aria-label="카드를 클릭하여 뒤집기" tabindex="0">';

    html += '<div class="card-face card-front">';
    html += '<div class="front-text">' + esc(card.front) + '</div>';
    if (hasTTS) {
      html += '<button class="btn-speak' + (isSpeaking ? ' speaking' : '') + '" id="btn-speak" aria-label="발음 듣기" title="발음 듣기">\u{1F50A}</button>';
    }
    html += '<div class="front-hint">tap to flip \u2728</div>';
    html += '</div>';

    html += '<div class="card-face card-back">';
    html += buildBack(card);
    html += '<div class="assess-row">';
    html += '<button class="btn-assess green" data-assess="green" aria-label="알겠어요">알겠어요</button>';
    html += '<button class="btn-assess yellow" data-assess="yellow" aria-label="애매해요">애매해요</button>';
    html += '<button class="btn-assess red" data-assess="red" aria-label="모르겠어요">모르겠어요</button>';
    html += '</div>';
    html += '</div>';

    html += '</div></div>';

    html += '<div class="nav-row">';
    html += '<button class="btn-nav" data-dir="prev"' + (idx === 0 ? ' disabled' : '') + ' aria-label="이전 카드">&#x2190; 이전</button>';
    html += '<div class="counter">' + (idx + 1) + ' / ' + total + '</div>';
    html += '<button class="btn-nav" data-dir="next" aria-label="다음 카드">다음 &#x2192;</button>';
    html += '</div>';

    app.innerHTML = html;
    bindEvents();
  }

  function navigate(dir) {
    if (dir === 'prev' && idx > 0) { idx--; flipped = false; render(); }
    else if (dir === 'next') {
      if (idx < cards.length - 1) { idx++; flipped = false; render(); }
      else { finished = true; render(); }
    }
  }

  function assess(level) {
    results[idx] = level;
    setTimeout(function() { navigate('next'); }, 200);
  }

  function bindEvents() {
    var container = app.querySelector('.card-container');
    if (container) {
      container.addEventListener('click', function(e) {
        if (e.target.closest('.btn-assess')) return;
        flipped = !flipped;
        container.classList.toggle('flipped', flipped);
      });
    }

    app.querySelectorAll('.btn-assess').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        assess(btn.dataset.assess);
      });
    });

    app.querySelectorAll('.btn-nav').forEach(function(btn) {
      btn.addEventListener('click', function() { navigate(btn.dataset.dir); });
    });

    var shuffleBtn = app.querySelector('.btn-shuffle');
    if (shuffleBtn) shuffleBtn.addEventListener('click', shuffle);

    var btnSpeak = document.getElementById('btn-speak');
    if (btnSpeak) btnSpeak.addEventListener('click', function(e) {
      e.stopPropagation();
      speakText(cards[idx].front);
    });
    var voiceSel = document.getElementById('voice-sel');
    if (voiceSel) voiceSel.addEventListener('change', function() {
      selectedVoiceIdx = parseInt(voiceSel.value);
    });
    var ttsSpeed = document.getElementById('tts-speed');
    if (ttsSpeed) ttsSpeed.addEventListener('input', function() {
      ttsRate = parseFloat(ttsSpeed.value);
      document.getElementById('tts-speed-val').textContent = ttsRate.toFixed(1) + 'x';
    });

    var area = app.querySelector('.card-area');
    if (area) {
      area.addEventListener('touchstart', function(e) {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
      }, { passive: true });

      area.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].screenX - touchStartX;
        var dy = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          if (dx < 0) navigate('next');
          else navigate('prev');
        }
      }, { passive: true });
    }
  }

  document.addEventListener('keydown', function(e) {
    if (finished) return;
    if (e.key === 'ArrowLeft') navigate('prev');
    else if (e.key === 'ArrowRight') navigate('next');
    else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      flipped = !flipped;
      var c = app.querySelector('.card-container');
      if (c) c.classList.toggle('flipped', flipped);
    }
  });

  render();
})();
</script>
</body>
</html>
